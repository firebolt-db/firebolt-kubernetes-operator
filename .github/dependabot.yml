---
version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "08:17"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 20
    cooldown:
      default-days: 7

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:45"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
