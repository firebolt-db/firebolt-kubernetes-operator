---
version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "08:17"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 20
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
      prometheus:
        patterns:
          - "github.com/prometheus/*"
      ginkgo-gomega:
        patterns:
          - "github.com/onsi/ginkgo/*"
          - "github.com/onsi/gomega"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:45"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
