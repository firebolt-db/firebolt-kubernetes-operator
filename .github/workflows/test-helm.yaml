# Runs `make prepare-test-e2e` + `make local-deploy` from the PR
# branch (operator binary + Helm chart on branch), then apply example manifests.
# The unit tests and e2e test CI do not deploy the operator via Helm (E2E runs in-process with
# cluster-admin), so chart RBAC/install regressions would otherwise slip through.
name: Test Helm

on:
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: test-helm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect docs-only change
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Determine whether the PR changed only docs
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # List the PR's changed files via the compare API (no checkout
          # needed). "docs" = markdown anywhere, plus docs/.
          # Fail-safe: any uncertainty leaves docs_only=false so the full
          # suite still runs.
          files="$(gh api --paginate \
            "repos/${REPO}/compare/${BASE_SHA}...${HEAD_SHA}" \
            --jq '.files[].filename' 2>/dev/null || true)"
          echo "Changed files:"
          printf '%s\n' "${files:-<none>}"
          non_docs="$(printf '%s\n' "${files}" \
            | grep -vE '\.mdx?$|^docs/' || true)"
          if [ -n "${files}" ] && [ -z "${non_docs}" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  test-helm:
    name: test-helm
    needs: detect
    if: needs.detect.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    env:
      KIND_CLUSTER: test-helm-quickstart
    steps:
      - name: Clean Up Disk Space on public GitHub Runner
        if: runner.os == 'Linux'
        run: |
          df -h /

          # Unused tool caches (comment any required ones with #)
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/julia* /usr/share/miniconda /usr/local/share/boost

          # Browsers + drivers + playwright cache
          sudo apt-get purge -y --auto-remove \
            firefox google-chrome-stable microsoft-edge-stable || true
          sudo rm -rf \
            /usr/local/share/chromedriver-linux64 \
            /usr/local/share/chromium \
            /root/.cache/ms-playwright \
            /home/runner/.cache/ms-playwright

          # Preinstalled Docker images and build cache
          docker image prune -af || true
          docker builder prune -af || true

          df -h /

      - name: Raise memlock limit for kind nodes (engine io_uring)
        run: |
          sudo mkdir -p /etc/systemd/system/docker.service.d
          sudo tee /etc/systemd/system/docker.service.d/memlock.conf > /dev/null <<'EOF'
          [Service]
          LimitMEMLOCK=infinity
          EOF
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json > /dev/null <<'EOF'
          {
            "default-ulimits": {
              "memlock": { "Name": "memlock", "Hard": -1, "Soft": -1 }
            }
          }
          EOF
          sudo systemctl daemon-reload
          sudo systemctl restart docker

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind v0.31.0
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Prepare Kind cluster and workload images
        run: |
          go mod tidy
          make prepare-test-e2e KIND_CLUSTER="${KIND_CLUSTER}"
        env:
          GOPRIVATE: github.com/firebolt-db/*

      # Guards the CRDs against regrowing past Helm's 1 MiB release-Secret
      # cap. Runs before the operator chart so these cluster-scoped CRDs
      # are not already present; the script installs the dedicated CRD chart,
      # waits for the CRDs to be Established, then uninstalls.
      - name: Verify CRD chart installs under Helm's 1 MiB Secret cap
        run: make helm-test-crds KIND_CLUSTER="${KIND_CLUSTER}"

      - name: Build operator image and Helm upgrade (branch chart + binary)
        run: make local-deploy KIND_CLUSTER="${KIND_CLUSTER}"
        env:
          GOPRIVATE: github.com/firebolt-db/*

      - name: Run helm-test target
        run: make helm-test

      - name: Verify website quickstart bundle
        run: make helm-test-website KIND_CLUSTER="${KIND_CLUSTER}"

  # Single stable required-check name for branch protection. `test-helm`
  # is a single job that already reports success when skipped, but this
  # gate closes the `detect` fail-open hole (a failed `detect` would skip
  # the heavy job and report a false success) and gives branch protection
  # one stable name independent of the worker job.
  helm-required:
    name: Helm Tests
    needs: [detect, test-helm]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify gated jobs
        env:
          DETECT: ${{ needs.detect.result }}
          HELM: ${{ needs.test-helm.result }}
        run: |
          if [ "$DETECT" != "success" ]; then
            echo "::error::detect did not succeed (result=$DETECT)"; exit 1
          fi
          case "$HELM" in
            success|skipped) echo "gate satisfied (test-helm=$HELM)";;
            *) echo "::error::test-helm result=$HELM"; exit 1;;
          esac
