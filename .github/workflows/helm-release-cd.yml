---
name: Helm - Release CD

env:
  AWS_CONTAINER_REGISTRY: 000000000000.dkr.ecr.us-east-1.amazonaws.com
  HELM_CHARTS_NAMESPACE: helm-charts

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-chart:
    if: "!startsWith(github.event.head_commit.message, 'chore(helm): bump chart to')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: "false"
          fetch-depth: 2

      - name: Check if app-release-cd will handle this
        if: github.event_name != 'workflow_dispatch'
        id: check
        run: |
          APP_CHANGES=$(git diff --name-only HEAD~1 HEAD -- ':!helm/' ':!README.md' ':!.github/' | wc -l)
          if [ "$APP_CHANGES" -gt 0 ]; then
            echo "App code also changed; deferring to app-release-cd"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.proceed != 'false'
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.GH_APP_CI_GITOPS_APP_ID }}
          private_key: ${{ secrets.GH_APP_CI_GITOPS_KEY_PEM }}

      - name: Install helm-docs
        if: steps.check.outputs.proceed != 'false'
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Determine chart version
        if: steps.check.outputs.proceed != 'false'
        id: chart
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CURR_VERSION=$(yq '.version' helm/firebolt-kubernetes-operator/Chart.yaml)
          APP_VERSION=$(yq '.appVersion' helm/firebolt-kubernetes-operator/Chart.yaml)

          # workflow_dispatch: publish the version already in Chart.yaml.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "chart_version=$CURR_VERSION" >> "$GITHUB_OUTPUT"
            echo "Releasing existing chart version $CURR_VERSION (appVersion: $APP_VERSION)"
            exit 0
          fi

          # If the developer already bumped Chart.version in their commit, honour it.
          PREV_VERSION=$(git show HEAD~1:helm/firebolt-kubernetes-operator/Chart.yaml | yq '.version')
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "chart_version=$CURR_VERSION" >> "$GITHUB_OUTPUT"
            echo "Chart.version already bumped ($PREV_VERSION -> $CURR_VERSION); using as-is."
            exit 0
          fi

          # ── Auto-bump based on conventional-commit message ────────────────
          COMMIT_MSG=$(git log --format='%s' -1)
          COMMIT_BODY=$(git log --format='%b' -1)

          MAJOR=$(echo "$CURR_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURR_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURR_VERSION" | cut -d. -f3)

          if echo "$COMMIT_BODY" | grep -qi 'BREAKING CHANGE'; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -qE '^feat(\(|:)'; then
            NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
            BUMP_TYPE="minor"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            BUMP_TYPE="patch"
          fi

          echo "Auto $BUMP_TYPE bump: $CURR_VERSION -> $NEW_VERSION (commit: $COMMIT_MSG)"

          yq -i ".version = \"$NEW_VERSION\"" helm/firebolt-kubernetes-operator/Chart.yaml

          # Regenerate helm chart README so the badges and install snippet
          # reflect the new version. Without this, the subsequent PR's lint
          # step (which enforces helm-docs freshness) fails until someone
          # manually regenerates.
          make helm-docs

          printf "# %s\n\n%s\n\n" "$NEW_VERSION" "$COMMIT_MSG" \
            | cat - helm/firebolt-kubernetes-operator/CHANGELOG.md > /tmp/CHANGELOG.md
          mv /tmp/CHANGELOG.md helm/firebolt-kubernetes-operator/CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config credential.helper '!f() { echo "password=${GITHUB_TOKEN}"; }; f'
          git add helm/firebolt-kubernetes-operator/Chart.yaml \
                  helm/firebolt-kubernetes-operator/CHANGELOG.md \
                  helm/firebolt-kubernetes-operator/README.md
          git diff --cached --name-only
          git commit -m "chore(helm): bump chart to $NEW_VERSION"
          git push https://x-access-token@github.com/${GITHUB_REPOSITORY}.git HEAD:main

          echo "chart_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        if: steps.check.outputs.proceed != 'false'
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4
        with:
          version: "latest"

      - name: Login to Amazon ECR
        if: steps.check.outputs.proceed != 'false'
        uses: firebolt-analytics/gha-workflows/.github/actions/ecr-login@6c80e1ec32794898d18d86160862131160b4ceba # v3.3.1

      - name: Package Helm chart
        if: steps.check.outputs.proceed != 'false'
        run: |
          mkdir -p /tmp/helm-packages
          helm package helm/firebolt-kubernetes-operator --destination /tmp/helm-packages
          echo "Packaged: $(ls /tmp/helm-packages)"

      - name: Push chart to Amazon ECR
        if: steps.check.outputs.proceed != 'false'
        run: |
          helm push \
            /tmp/helm-packages/firebolt-kubernetes-operator-${{ steps.chart.outputs.chart_version }}.tgz \
            oci://${{ env.AWS_CONTAINER_REGISTRY }}/${{ env.HELM_CHARTS_NAMESPACE }}
          echo "Pushed firebolt-kubernetes-operator:${{ steps.chart.outputs.chart_version }} to ECR"

      - name: Job summary
        if: steps.check.outputs.proceed != 'false'
        run: |
          echo "### Helm Chart Published :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Chart** | \`firebolt-kubernetes-operator\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.chart.outputs.chart_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Registry** | \`oci://${{ env.AWS_CONTAINER_REGISTRY }}/${{ env.HELM_CHARTS_NAMESPACE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Install" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "helm install firebolt-operator oci://${{ env.AWS_CONTAINER_REGISTRY }}/${{ env.HELM_CHARTS_NAMESPACE }}/firebolt-kubernetes-operator --version ${{ steps.chart.outputs.chart_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

