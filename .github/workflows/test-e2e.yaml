name: E2E Tests

on:
  pull_request:

permissions: {}

# Cancel any in-flight run of this workflow for the same PR/branch as soon
# as a new commit is pushed. E2E runs are long and expensive; keeping the
# superseded run going just burns a runner on a result that nobody is
# going to look at. `github.ref` is the PR's merge ref (refs/pull/<n>/merge)
# on pull_request events, so each PR gets its own concurrency group and
# parallel PRs don't cancel each other.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect docs-only change
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Determine whether the PR changed only docs
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # List the PR's changed files via the compare API (no checkout
          # needed). "docs" = markdown anywhere, plus docs/.
          # Fail-safe: any uncertainty leaves docs_only=false so the full
          # suite still runs.
          files="$(gh api --paginate \
            "repos/${REPO}/compare/${BASE_SHA}...${HEAD_SHA}" \
            --jq '.files[].filename' 2>/dev/null || true)"
          echo "Changed files:"
          printf '%s\n' "${files:-<none>}"
          non_docs="$(printf '%s\n' "${files}" \
            | grep -vE '\.mdx?$|^docs/' || true)"
          if [ -n "${files}" ] && [ -z "${non_docs}" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  test-e2e:
    name: E2E Tests (${{ matrix.variant }})
    needs: detect
    if: needs.detect.outputs.docs_only != 'true'
    runs-on: ubuntu-16core-64gb-600ssd-amd64
    permissions:
      id-token: write
      contents: read
      packages: read
    strategy:
      # Run the E2E suite under both image variants. `dev` tracks the
      # mutable `:dev` aliases; `latest` pins to the release-* build in
      # config/images/defaults.latest.env. `fail-fast: false` keeps one
      # variant's failure from cancelling the other so a variant-specific
      # regression stays visible, and each matrix leg runs on its own
      # runner (so the hardcoded KIND_CLUSTER name does not collide).
      fail-fast: false
      matrix:
        variant: [dev, latest]
    steps:
      - name: Clean Up Disk Space on public GitHub Runner
        if: runner.os == 'Linux'
        run: |
          df -h /

          # Unused tool caches (comment any required ones with #)
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/julia* /usr/share/miniconda /usr/local/share/boost

          # Browsers + drivers + playwright cache
          sudo apt-get purge -y --auto-remove \
            firefox google-chrome-stable microsoft-edge-stable || true
          sudo rm -rf \
            /usr/local/share/chromedriver-linux64 \
            /usr/local/share/chromium \
            /root/.cache/ms-playwright \
            /home/runner/.cache/ms-playwright

          # Preinstalled Docker images and build cache
          docker image prune -af || true
          docker builder prune -af || true

          df -h /

      - name: Raise memlock limit for kind nodes
        # The engine binary uses io_uring and registers buffers via
        # io_uring_register_buffers, which fails with ENOMEM when RLIMIT_MEMLOCK
        # is at the host default (~64KB). Engine pods then crash on init with:
        #   io_uring_register_buffers failed: Cannot allocate memory (12)
        # and never reach Ready. CAP_IPC_LOCK doesn't help: io_uring buffer
        # registration strictly checks RLIMIT_MEMLOCK and ignores the cap.
        #
        # The fix has TWO layers and both are required:
        #   1. systemd's docker.service unit caps the daemon's own ulimit via
        #      LimitMEMLOCK=. Without raising this, the daemon can't grant a
        #      higher limit to its containers no matter what daemon.json says.
        #   2. The daemon's default-ulimits config then applies the now-
        #      unlimited ceiling to every container it spawns, including the
        #      kind node containers (and the pods kubelet runs inside them).
        run: |
          sudo mkdir -p /etc/systemd/system/docker.service.d
          sudo tee /etc/systemd/system/docker.service.d/memlock.conf > /dev/null <<'EOF'
          [Service]
          LimitMEMLOCK=infinity
          EOF

          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json > /dev/null <<'EOF'
          {
            "default-ulimits": {
              "memlock": { "Name": "memlock", "Hard": -1, "Soft": -1 }
            }
          }
          EOF

          sudo systemctl daemon-reload
          sudo systemctl restart docker

          # Confirm: dockerd's own ulimit, AND a fresh container's ulimit
          echo "=== dockerd LimitMEMLOCK (systemd-level) ==="
          systemctl show docker | grep -E '^Limit(MEMLOCK|MEMLOCKSoft)='
          echo "=== container memlock (daemon-level default-ulimits) ==="
          docker run --rm alpine sh -c 'ulimit -l'

      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind v0.31.0
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      # The E2E suite runs once per image variant (see the matrix above):
      # `prepare-test-e2e` loads the variant's engine/metadata images into
      # Kind and `test-e2e` runs the suite against them, so a bump to
      # config/images/defaults.latest.env is exercised end-to-end here too.
      # IMAGE_VARIANT MUST be threaded into both make calls so the images
      # loaded into Kind match the operator binary's embedded defaults.
      - name: Prepare Kind cluster and images (${{ matrix.variant }} variant)
        id: prepare-kind
        # `pipefail` is documented as part of GitHub Actions' default Linux
        # shell (`bash -eo pipefail`), but this runner actually invokes
        # `/usr/bin/bash -e {0}` — without pipefail. Set it explicitly so a
        # non-zero exit from `make prepare-test-e2e` actually fails the
        # step instead of being masked by `tee`'s 0 exit; otherwise an
        # image-pull regression in load-e2e-images.sh surfaces as a
        # confusing test-suite failure several minutes later.
        #
        # The log file is named after this step's id so the upload-artifact
        # bundle below makes the source step obvious, and so adding more
        # tee'd steps later is mechanical.
        run: |
          set -o pipefail
          go mod tidy
          make prepare-test-e2e KIND_CLUSTER="e2e-ci" IMAGE_VARIANT=${{ matrix.variant }} 2>&1 | tee prepare-kind.log
        env:
          GOPRIVATE: github.com/firebolt-db/*

      - name: Run E2E tests (${{ matrix.variant }} variant)
        id: run-e2e
        # Same pipefail rationale as `prepare-kind`: tee would otherwise
        # mask a non-zero exit from `make test-e2e` and we'd lose the
        # connection between the failing step and its log file.
        run: |
          set -o pipefail
          make test-e2e KIND_CLUSTER="e2e-ci" IMAGE_VARIANT=${{ matrix.variant }} GINKGO_PROCS=6 2>&1 | tee run-e2e.log
        env:
          GOPRIVATE: github.com/firebolt-db/*
          E2E_ARTIFACT_DIR: ${{ github.workspace }}

      - name: E2E failure summary (JUnit)
        if: always()
        run: python3 scripts/summarize-e2e-junit.py e2e-report.xml >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-variant name: matrix legs upload concurrently and
          # upload-artifact rejects duplicate artifact names within a run.
          name: e2e-report-${{ matrix.variant }}
          path: |
            e2e-report.xml
            prepare-kind.log
            run-e2e.log
            pod-logs/
          retention-days: 30

  # Single stable required-check name for branch protection. Matrix legs
  # (E2E Tests (dev/latest)) are not reliably emitted as per-combination
  # checks when skipped, so a docs-only PR would leave them Pending and
  # block the merge. This gate runs `if: always()`, collapses both matrix
  # legs into one `needs.test-e2e.result`, and fails closed if `detect`
  # itself failed (which would otherwise skip the heavy job and report a
  # false success).
  e2e-required:
    name: E2E Tests
    needs: [detect, test-e2e]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify gated jobs
        env:
          DETECT: ${{ needs.detect.result }}
          E2E: ${{ needs.test-e2e.result }}
        run: |
          if [ "$DETECT" != "success" ]; then
            echo "::error::detect did not succeed (result=$DETECT)"; exit 1
          fi
          case "$E2E" in
            success|skipped) echo "gate satisfied (test-e2e=$E2E)";;
            *) echo "::error::test-e2e result=$E2E"; exit 1;;
          esac
