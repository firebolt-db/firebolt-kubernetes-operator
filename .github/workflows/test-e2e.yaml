name: E2E Tests

on:
  pull_request:

# Cancel any in-flight run of this workflow for the same PR/branch as soon
# as a new commit is pushed. E2E runs are long and expensive; keeping the
# superseded run going just burns a runner on a result that nobody is
# going to look at. `github.ref` is the PR's merge ref (refs/pull/<n>/merge)
# on pull_request events, so each PR gets its own concurrency group and
# parallel PRs don't cancel each other.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Clean Up Disk Space on public GitHub Runner
        if: runner.os == 'Linux'
        run: |
          # Space usage before cleanup
          df -h /

          # Remove unused tool caches (comment any required ones with #)
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift

          # Verify gains
          df -h /
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Clone the code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind v0.31.0
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Prepare Kind cluster and images
        run: |
          go mod tidy
          make prepare-test-e2e KIND_CLUSTER="e2e-ci" 2>&1 | tee test.log
        env:
          GOPRIVATE: github.com/firebolt-db/*

      - name: Run E2E tests
        run: make test-e2e KIND_CLUSTER="e2e-ci" GINKGO_PROCS=23
        env:
          GOPRIVATE: github.com/firebolt-db/*
          E2E_ARTIFACT_DIR: ${{ github.workspace }}

      - name: E2E failure summary (JUnit)
        if: always()
        run: python3 scripts/summarize-e2e-junit.py e2e-report.xml >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e-report.xml
            test.log
            pod-logs/
          retention-days: 7
