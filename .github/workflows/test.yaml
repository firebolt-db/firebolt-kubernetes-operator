name: Tests

on:
  pull_request:

permissions: {}

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}
          permission-contents: read

      - name: Configure Git for private modules
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # `make test` runs against the implicit-default `dev` image variant.
      # The `latest` variant is intentionally NOT exercised in CI yet —
      # until the engine/metadata `:latest` GHCR aliases (and the auto-PR
      # that bumps `defaults.latest.env` off them) are in place, the
      # `latest` variant would just validate a frozen-in-time pinned build
      # that nobody is bumping. Once those land, flip the project default
      # back to `latest` and add a matrix here so `make test` runs once
      # per variant and both gate every PR.
      - name: Running Tests (default = dev variant)
        run: |
          go mod tidy
          make test
        env:
          GOPRIVATE: github.com/firebolt-db/*

      # The outer-Reconcile rapid harness (build tag `outerharness`) drives the
      # real reconciler against envtest, so it catches CRD/admission regressions
      # that the pure-function property test and `make test` miss — e.g. the
      # k8s 1.36 `spec.template.spec.containers: Required value` rejection.
      - name: Running outer-Reconcile property tests
        run: make test-property
        env:
          GOPRIVATE: github.com/firebolt-db/*
