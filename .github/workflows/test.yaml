name: Tests

on:
  pull_request:

permissions: {}

jobs:
  test:
    name: Run on Ubuntu (${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      # Run the unit suite under both image variants so a bump to
      # config/images/defaults.latest.env is gated by the same tests as the
      # implicit-default `dev` build. `fail-fast: false` keeps one variant's
      # failure from cancelling the other, so a variant-specific regression
      # stays visible.
      fail-fast: false
      matrix:
        variant: [dev, latest]
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # `make test` runs once per image variant (see the matrix above):
      # `dev` tracks the mutable `:dev` aliases, `latest` pins to the
      # release-* build in config/images/defaults.latest.env. Both gate
      # every PR, so a bump to defaults.latest.env is validated here too.
      - name: Running Tests (${{ matrix.variant }} variant)
        run: |
          go mod tidy
          make test IMAGE_VARIANT=${{ matrix.variant }}
        env:
          GOPRIVATE: github.com/firebolt-db/*

      # The outer-Reconcile rapid harness (build tag `outerharness`) drives the
      # real reconciler against envtest, so it catches CRD/admission regressions
      # that the pure-function property test and `make test` miss â€” e.g. the
      # k8s 1.36 `spec.template.spec.containers: Required value` rejection.
      #
      # `make test-property` builds with `-tags outerharness` only â€” it never
      # adds the `latest` tag, so the image variant does not change what it
      # exercises. Run it once (on the `dev` leg) instead of duplicating it
      # across the matrix.
      - name: Running outer-Reconcile property tests
        if: matrix.variant == 'dev'
        run: make test-property
        env:
          GOPRIVATE: github.com/firebolt-db/*

  # Single stable required-check name for branch protection. The unit
  # matrix legs (Run on Ubuntu (dev/latest)) were never required directly;
  # this gate exposes one stable name. The unit suite always runs (no
  # `detect`), so the gate simply requires `test` to have succeeded.
  unit-tests:
    name: Unit Tests
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify gated jobs
        env:
          TEST: ${{ needs.test.result }}
        run: |
          if [ "$TEST" != "success" ]; then
            echo "::error::test result=$TEST"; exit 1
          fi
          echo "gate satisfied (test=$TEST)"
