name: E2E Tests

on:
  pull_request:

jobs:
  plan:
    name: Plan E2E matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.groups.outputs.matrix }}
    steps:
      - name: Clone the code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Extract test groups
        id: groups
        run: echo "matrix=$(./scripts/extract-e2e-groups.sh 4)" >> "$GITHUB_OUTPUT"

  test-e2e:
    name: "E2E (${{ matrix.name }})"
    needs: plan
    runs-on: ubuntu-22.04-14-cores-54gb-amd64
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Generate app token
        id: generate_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a  # v2.1.0
        with:
          app_id: ${{ secrets.GH_APP_CI_GITOPS_APP_ID }}
          private_key: ${{ secrets.GH_APP_CI_GITOPS_KEY_PEM }}

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Clone the code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - name: Login to Amazon ECR
        uses: firebolt-analytics/gha-workflows/.github/actions/ecr-login@main

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Prepare Kind cluster and images
        run: |
          go mod tidy
          make prepare-test-e2e KIND_CLUSTER="e2e-${{ matrix.name }}"
        env:
          GOPRIVATE: github.com/firebolt-analytics/*

      - name: Running E2E tests (${{ matrix.name }})
        run: make test-e2e KIND_CLUSTER="e2e-${{ matrix.name }}" GINKGO_FOCUS="${{ matrix.focus }}"
        env:
          GOPRIVATE: github.com/firebolt-analytics/*

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ matrix.name }}
          path: |
            e2e-report.xml
            test.log
          retention-days: 7
