name: Formal Verification

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  tlc:
    name: TLC model checker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache TLA+ tools
        id: cache-tla
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tla2tools.jar
          key: tla2tools-v1.8.0

      - name: Download TLA+ tools
        if: steps.cache-tla.outputs.cache-hit != 'true'
        run: |
          wget -q -O tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLC — FireboltEngine
        run: |
          java -cp tla2tools.jar tlc2.TLC \
            -workers 2 \
            -config formal/FireboltEngine.cfg \
            formal/FireboltEngine.tla

      - name: Run TLC — FireboltInstance
        run: |
          java -cp tla2tools.jar tlc2.TLC \
            -workers 2 \
            -config formal/FireboltInstance.cfg \
            formal/FireboltInstance.tla
