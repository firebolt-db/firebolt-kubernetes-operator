name: Formal Verification

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  tlc:
    name: TLC model checker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache TLA+ tools
        id: cache-tla
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tla2tools.jar
          key: tla2tools-v1.8.0

      - name: Download TLA+ tools
        if: steps.cache-tla.outputs.cache-hit != 'true'
        run: |
          wget -q -O tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLC — FireboltEngine
        run: |
          java -cp tla2tools.jar tlc2.TLC \
            -workers 2 \
            -config formal/FireboltEngine.cfg \
            formal/FireboltEngine.tla

      - name: Run TLC — FireboltInstance
        run: |
          java -cp tla2tools.jar tlc2.TLC \
            -workers 2 \
            -config formal/FireboltInstance.cfg \
            formal/FireboltInstance.tla
