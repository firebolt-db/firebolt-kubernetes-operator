name: Lint

on:
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: generate_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a  # v2.1.0
        with:
          app_id: ${{ secrets.GH_APP_CI_GITOPS_APP_ID }}
          private_key: ${{ secrets.GH_APP_CI_GITOPS_KEY_PEM }}

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Clone the code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
        env:
          GOPRIVATE: github.com/firebolt-analytics/*

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: make helm-lint

      - name: Validate Helm templates
        run: make helm-template > /dev/null

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Verify Helm chart README is up to date
        run: |
          make helm-docs
          if ! git diff --exit-code -- helm/firebolt-kubernetes-operator/README.md; then
            echo "ERROR: helm/firebolt-kubernetes-operator/README.md is out of date." 1>&2
            echo "       Run 'make helm-docs' locally and commit the result." 1>&2
            exit 1
          fi
