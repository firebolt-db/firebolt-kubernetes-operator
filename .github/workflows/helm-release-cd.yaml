---
name: Helm - Release CD

env:
  HELM_CHARTS_NAMESPACE: helm-charts
  GHCR_REGISTRY: ghcr.io

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-chart:
    # Skip self-triggered runs for any `chore(helm): bump ...` commit, whether
    # it came from app-release-cd (legacy singular "bump chart to X") or from
    # this workflow (plural "bump charts to operator=X crds=Y"). Without this,
    # the workflow would loop on its own bump commit.
    if: "!startsWith(github.event.head_commit.message, 'chore(helm): bump')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: "false"
          fetch-depth: 0
          persist-credentials: false

      - name: Check if app-release-cd will handle this
        # On a mixed PR (both helm/** and app code changed), this workflow and
        # app-release-cd fire in parallel because their path filters are
        # disjoint. app-release-cd runs semantic-release, bumps Chart.yaml,
        # commits back to main, then dispatches this workflow to publish the
        # packaged chart. We must stand down here so the chart isn't bumped
        # twice. Any file outside helm/, README.md, or .github/ is treated as
        # app-side and triggers deferral.
        #
        # Compare github.event.before..github.sha (all commits in the push)
        # rather than HEAD~1..HEAD: a rebase merge can push multiple commits
        # at once, and the last commit alone may only touch helm/ even when
        # earlier commits in the same push touch app code.
        if: github.event_name != 'workflow_dispatch'
        id: check
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          # Empty/zero BEFORE_SHA happens on branch creation; treat as no defer.
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          APP_CHANGES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- ':!helm/' ':!README.md' ':!.github/' | wc -l)
          if [ "$APP_CHANGES" -gt 0 ]; then
            echo "App code also changed in this push; deferring to app-release-cd"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Only helm/ changed in this push; proceeding"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: steps.check.outputs.proceed != 'false'
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}
          permission-contents: write

      - name: Install helm-docs
        if: steps.check.outputs.proceed != 'false'
        run: |
          HELM_DOCS_VERSION=1.14.2
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Determine chart version
        if: steps.check.outputs.proceed != 'false'
        id: chart
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CURR_VERSION=$(yq '.version' helm/firebolt-kubernetes-operator/Chart.yaml)
          APP_VERSION=$(yq '.appVersion' helm/firebolt-kubernetes-operator/Chart.yaml)
          CRD_CURR=$(yq '.version' helm/firebolt-operator-crds/Chart.yaml)
          NEEDS_COMMIT=false

          # workflow_dispatch: publish the versions already in Chart.yaml.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "chart_version=$CURR_VERSION" >> "$GITHUB_OUTPUT"
            echo "crd_chart_version=$CRD_CURR" >> "$GITHUB_OUTPUT"
            echo "Releasing existing versions: operator=$CURR_VERSION crds=$CRD_CURR (appVersion: $APP_VERSION)"
            exit 0
          fi

          # If the developer already bumped Chart.version in their commit, honour it.
          PREV_VERSION=$(git show HEAD~1:helm/firebolt-kubernetes-operator/Chart.yaml | yq '.version')
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "chart_version=$CURR_VERSION" >> "$GITHUB_OUTPUT"
            echo "Chart.version already bumped ($PREV_VERSION -> $CURR_VERSION); using as-is."
          else
            # ── Auto-bump based on conventional-commit message ────────────────
            COMMIT_MSG=$(git log --format='%s' -1)
            COMMIT_BODY=$(git log --format='%b' -1)

            MAJOR=$(echo "$CURR_VERSION" | cut -d. -f1)
            MINOR=$(echo "$CURR_VERSION" | cut -d. -f2)
            PATCH=$(echo "$CURR_VERSION" | cut -d. -f3)

            if echo "$COMMIT_BODY" | grep -qi 'BREAKING CHANGE'; then
              CURR_VERSION="$((MAJOR + 1)).0.0"
              BUMP_TYPE="major"
            elif echo "$COMMIT_MSG" | grep -qE '^feat(\(|:)'; then
              CURR_VERSION="$MAJOR.$((MINOR + 1)).0"
              BUMP_TYPE="minor"
            else
              CURR_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              BUMP_TYPE="patch"
            fi

            echo "Auto $BUMP_TYPE bump: operator chart -> $CURR_VERSION (commit: $COMMIT_MSG)"
            yq -i ".version = \"$CURR_VERSION\"" helm/firebolt-kubernetes-operator/Chart.yaml
            echo "chart_version=$CURR_VERSION" >> "$GITHUB_OUTPUT"
            NEEDS_COMMIT=true
            OPERATOR_BUMPED=true
          fi

          # ── Bump CRD chart version ────────────────
          CRD_PREV=$(git show HEAD~1:helm/firebolt-operator-crds/Chart.yaml 2>/dev/null | yq '.version' 2>/dev/null || echo "")
          if [ "$CRD_PREV" != "$CRD_CURR" ] && [ -n "$CRD_PREV" ]; then
            echo "CRD chart already bumped ($CRD_PREV -> $CRD_CURR); using as-is."
          else
            CRD_MAJ=$(echo "$CRD_CURR" | cut -d. -f1)
            CRD_MIN=$(echo "$CRD_CURR" | cut -d. -f2)
            CRD_PAT=$(echo "$CRD_CURR" | cut -d. -f3)
            CRD_CURR="$CRD_MAJ.$CRD_MIN.$((CRD_PAT + 1))"
            yq -i ".version = \"$CRD_CURR\"" helm/firebolt-operator-crds/Chart.yaml
            NEEDS_COMMIT=true
          fi
          echo "crd_chart_version=$CRD_CURR" >> "$GITHUB_OUTPUT"

          if [ "$NEEDS_COMMIT" = "true" ]; then
            make helm-docs

            if [ "${OPERATOR_BUMPED:-false}" = "true" ]; then
              COMMIT_MSG=${COMMIT_MSG:-$(git log --format='%s' -1)}
              printf "# %s\n\n%s\n\n" "$CURR_VERSION" "$COMMIT_MSG" \
                | cat - helm/firebolt-kubernetes-operator/CHANGELOG.md > /tmp/CHANGELOG.md
              mv /tmp/CHANGELOG.md helm/firebolt-kubernetes-operator/CHANGELOG.md
            fi

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add helm/firebolt-kubernetes-operator/Chart.yaml \
                    helm/firebolt-kubernetes-operator/CHANGELOG.md \
                    helm/firebolt-kubernetes-operator/README.md \
                    helm/firebolt-operator-crds/Chart.yaml \
                    helm/firebolt-operator-crds/README.md
            git diff --cached --name-only
            git commit -m "chore(helm): bump charts to operator=$CURR_VERSION crds=$CRD_CURR"
            git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi

      - name: Set up Helm
        if: steps.check.outputs.proceed != 'false'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "latest"

      - name: Login to GitHub Container Registry (Helm)
        if: steps.check.outputs.proceed != 'false'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login "${{ env.GHCR_REGISTRY }}" --username "${GITHUB_ACTOR}" --password-stdin

      - name: Package Helm charts
        if: steps.check.outputs.proceed != 'false'
        run: |
          mkdir -p /tmp/helm-packages
          helm package helm/firebolt-kubernetes-operator --destination /tmp/helm-packages
          helm package helm/firebolt-operator-crds --destination /tmp/helm-packages
          echo "Packaged: $(ls /tmp/helm-packages)"

      - name: Push charts to GHCR
        if: steps.check.outputs.proceed != 'false'
        run: |
          REGISTRY="oci://${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.HELM_CHARTS_NAMESPACE }}"
          for tgz in /tmp/helm-packages/*.tgz; do
            helm push "$tgz" "$REGISTRY"
            echo "Pushed $(basename "$tgz") to GHCR"
          done

      - name: Job summary
        if: steps.check.outputs.proceed != 'false'
        run: |
          echo "### Helm Charts Published :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chart | Version | Registry |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`firebolt-kubernetes-operator\` | \`${{ steps.chart.outputs.chart_version }}\` | \`oci://${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.HELM_CHARTS_NAMESPACE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`firebolt-operator-crds\` | \`${{ steps.chart.outputs.crd_chart_version }}\` | \`oci://${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.HELM_CHARTS_NAMESPACE }}\` |" >> "$GITHUB_STEP_SUMMARY"
