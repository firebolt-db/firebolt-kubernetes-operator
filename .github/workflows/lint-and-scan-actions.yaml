# Lint and security-scan GitHub Actions workflow files.
#
# Runs actionlint (structural/logic checks) and zizmor (security audit)
# as parallel jobs whenever files under .github/ are modified.

name: Lint & Scan GitHub Actions

on:
  push:
    branches: ["main"]
    paths: [".github/**"]
  pull_request:
    branches: ["**"]
    paths: [".github/**"]

permissions: {}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write      # needed for github-pr-check reporter
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-pr-check
          fail_level: error

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: "false"
          # Fail only on findings of severity low or higher.
          # Informational findings (e.g. style suggestions like
          # superfluous-actions) are reported but do not fail the job.
          min-severity: low
