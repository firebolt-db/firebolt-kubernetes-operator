---
name: App - Release CD

env:
  GHCR_IMAGE: ghcr.io/firebolt-db/firebolt-kubernetes-operator
  GHCR_REGISTRY: ghcr.io

on:
  push:
    branches: [main]
    paths-ignore:
      - "helm/**"
      - "README.md"
      - ".github/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  semantic_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_git_tag: ${{ steps.semantic_release.outputs.new_release_git_tag }}
      chart_version: ${{ steps.update_helm_chart.outputs.chart_version }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}
          permission-contents: write
          # Needed to dispatch the helm-release-cd workflow after pushing
          # the chart version bump commit.
          permission-actions: write
          # Needed by @semantic-release/github's success-lifecycle GraphQL
          # query (`associatedPullRequests`) when looking up PRs and issues
          # to comment on.
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: "false"
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Semantic release
        id: semantic_release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 25
          extra_plugins: |
            conventional-changelog-conventionalcommits@9
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Fail in case of no release
        if: steps.semantic_release.outputs.new_release_git_tag == ''
        run: |
          echo "ERROR: no release was created" 1>&2
          exit 8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.semantic_release.outputs.new_release_git_tag }}
          body: "${{ steps.semantic_release.outputs.new_release_notes }}"

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Update Helm chart version and changelog
        id: update_helm_chart
        env:
          TAG: ${{ steps.semantic_release.outputs.new_release_git_tag }}
          RELEASE_NOTES: ${{ steps.semantic_release.outputs.new_release_notes }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CURRENT=$(yq '.version' helm/firebolt-kubernetes-operator/Chart.yaml)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          CHART_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"

          yq -i ".appVersion = \"$TAG\""           helm/firebolt-kubernetes-operator/Chart.yaml
          yq -i ".version    = \"$CHART_VERSION\""  helm/firebolt-kubernetes-operator/Chart.yaml

          CRD_CURRENT=$(yq '.version' helm/firebolt-operator-crds/Chart.yaml)
          CRD_MAJOR=$(echo "$CRD_CURRENT" | cut -d. -f1)
          CRD_MINOR=$(echo "$CRD_CURRENT" | cut -d. -f2)
          CRD_PATCH=$(echo "$CRD_CURRENT" | cut -d. -f3)
          CRD_CHART_VERSION="$CRD_MAJOR.$CRD_MINOR.$((CRD_PATCH + 1))"

          yq -i ".appVersion = \"$TAG\""               helm/firebolt-operator-crds/Chart.yaml
          yq -i ".version    = \"$CRD_CHART_VERSION\""  helm/firebolt-operator-crds/Chart.yaml

          make helm-docs

          printf "# %s\n\nappVersion: %s\n\n%s\n\n" \
            "$CHART_VERSION" "$TAG" "$RELEASE_NOTES" \
            | cat - helm/firebolt-kubernetes-operator/CHANGELOG.md > /tmp/CHANGELOG.md
          mv /tmp/CHANGELOG.md helm/firebolt-kubernetes-operator/CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/firebolt-kubernetes-operator/Chart.yaml \
                  helm/firebolt-kubernetes-operator/CHANGELOG.md \
                  helm/firebolt-kubernetes-operator/README.md \
                  helm/firebolt-operator-crds/Chart.yaml \
                  helm/firebolt-operator-crds/README.md
          git diff --cached --name-only
          git commit -m "chore(helm): bump chart to $CHART_VERSION (appVersion $TAG)"
          git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

          curl --fail -sS -X POST \
            -H "Authorization: Bearer ${GH_APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/helm-release-cd.yaml/dispatches" \
            -d '{"ref":"main"}'

  build:
    needs: semantic_release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    outputs:
      image: ${{ steps.build_image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: "false"
          persist-credentials: false

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}

      - name: Build image
        id: build_image
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FULL_IMAGE="${{ env.GHCR_IMAGE }}:$IMAGE_TAG"

          git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com".insteadOf "https://github.com"

          make docker-build IMG="$FULL_IMAGE" VERSION="$IMAGE_TAG"

          echo "image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Built $FULL_IMAGE (not pushed yet)"

      - name: Save image as tarball
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
        run: |
          FULL_IMAGE="${{ env.GHCR_IMAGE }}:$IMAGE_TAG"
          docker save "$FULL_IMAGE" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: operator-image
          path: image.tar
          retention-days: 1

  push-image:
    needs:
      - semantic_release
      - build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-image

      - name: Load image
        run: docker load < image.tar

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: push_image
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
        run: |
          FULL_IMAGE="${{ env.GHCR_IMAGE }}:$IMAGE_TAG"
          docker push "$FULL_IMAGE"

          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$FULL_IMAGE" 2>/dev/null \
            | cut -d@ -f2)
          if [ -z "$digest" ]; then
            digest=$(docker pull "$FULL_IMAGE" | grep ^Digest | awk '{ print $2 }')
          fi
          if [ -z "$digest" ]; then
            echo "ERROR: cannot get digest for $FULL_IMAGE" 1>&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Pushed $FULL_IMAGE ($digest)"

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign image
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
          DIGEST: ${{ steps.push_image.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.GHCR_IMAGE }}@${DIGEST}"

      - name: Job summary
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
          CHART_VERSION: ${{ needs.semantic_release.outputs.chart_version }}
        run: |
          {
            echo "### Operator Release :rocket:"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Image** | \`${{ env.GHCR_IMAGE }}:$IMAGE_TAG\` |"
            echo "| **App Version** | \`$IMAGE_TAG\` |"
            echo "| **Chart Version** | \`$CHART_VERSION\` |"
          } >> "$GITHUB_STEP_SUMMARY"
