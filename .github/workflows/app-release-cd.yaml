---
name: App - Release CD

env:
  ECR_REPO_NAME: "firebolt-kubernetes-operator"
  AWS_CONTAINER_REGISTRY: 000000000000.dkr.ecr.us-east-1.amazonaws.com

on:
  push:
    branches: [main]
    paths-ignore:
      - "helm/**"
      - "README.md"
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  semantic_release:
    runs-on: ubuntu-latest
    outputs:
      new_release_git_tag: ${{ steps.semantic_release.outputs.new_release_git_tag }}
      chart_version: ${{ steps.update_helm_chart.outputs.chart_version }}
    steps:
      - name: Generate app token
        id: generate_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.GH_APP_CI_GITOPS_APP_ID }}
          private_key: ${{ secrets.GH_APP_CI_GITOPS_KEY_PEM }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: "false"
          token: ${{ steps.generate_token.outputs.token }}

      - name: Configure registry
        run: |
          npm config set @firebolt-analytics:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}

      - name: Semantic release
        id: semantic_release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 18
          extends: |
            @firebolt-analytics/semantic-release-config-simple
          extra_plugins: |
            conventional-changelog-conventionalcommits@4
            @firebolt-analytics/semantic-release-config-simple@^1.x.x
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Fail in case of no release
        if: steps.semantic_release.outputs.new_release_git_tag == ''
        run: |
          echo "ERROR: no release was created" 1>&2
          exit 8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.semantic_release.outputs.new_release_git_tag }}
          body: "${{ steps.semantic_release.outputs.new_release_notes }}"

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Update Helm chart version and changelog
        id: update_helm_chart
        env:
          TAG: ${{ steps.semantic_release.outputs.new_release_git_tag }}
          RELEASE_NOTES: ${{ steps.semantic_release.outputs.new_release_notes }}
          GH_APP_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          CURRENT=$(yq '.version' helm/firebolt-kubernetes-operator/Chart.yaml)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          CHART_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"

          yq -i ".appVersion = \"$TAG\""           helm/firebolt-kubernetes-operator/Chart.yaml
          yq -i ".version    = \"$CHART_VERSION\""  helm/firebolt-kubernetes-operator/Chart.yaml

          CRD_CURRENT=$(yq '.version' helm/firebolt-operator-crds/Chart.yaml)
          CRD_MAJOR=$(echo "$CRD_CURRENT" | cut -d. -f1)
          CRD_MINOR=$(echo "$CRD_CURRENT" | cut -d. -f2)
          CRD_PATCH=$(echo "$CRD_CURRENT" | cut -d. -f3)
          CRD_CHART_VERSION="$CRD_MAJOR.$CRD_MINOR.$((CRD_PATCH + 1))"

          yq -i ".appVersion = \"$TAG\""               helm/firebolt-operator-crds/Chart.yaml
          yq -i ".version    = \"$CRD_CHART_VERSION\""  helm/firebolt-operator-crds/Chart.yaml

          make helm-docs

          printf "# %s\n\nappVersion: %s\n\n%s\n\n" \
            "$CHART_VERSION" "$TAG" "$RELEASE_NOTES" \
            | cat - helm/firebolt-kubernetes-operator/CHANGELOG.md > /tmp/CHANGELOG.md
          mv /tmp/CHANGELOG.md helm/firebolt-kubernetes-operator/CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/firebolt-kubernetes-operator/Chart.yaml \
                  helm/firebolt-kubernetes-operator/CHANGELOG.md \
                  helm/firebolt-kubernetes-operator/README.md \
                  helm/firebolt-operator-crds/Chart.yaml \
                  helm/firebolt-operator-crds/README.md
          git diff --cached --name-only
          git commit -m "chore(helm): bump chart to $CHART_VERSION (appVersion $TAG)"
          git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

          curl --fail -sS -X POST \
            -H "Authorization: Bearer ${GH_APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/helm-release-cd.yaml/dispatches" \
            -d '{"ref":"main"}'

  build:
    needs: semantic_release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.build_image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: "false"

      - name: Generate app token
        id: generate_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.GH_APP_CI_GITOPS_APP_ID }}
          private_key: ${{ secrets.GH_APP_CI_GITOPS_KEY_PEM }}

      - name: Build image
        id: build_image
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
        run: |
          AWS_IMAGE="${{ env.AWS_CONTAINER_REGISTRY }}/${{ env.ECR_REPO_NAME }}:$IMAGE_TAG"

          git config --global url."https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com".insteadOf "https://github.com"

          make docker-build IMG="$AWS_IMAGE" VERSION="$IMAGE_TAG"

          echo "image=$AWS_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Built $AWS_IMAGE (not pushed yet)"

      - name: Save image as tarball
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
        run: |
          AWS_IMAGE="${{ env.AWS_CONTAINER_REGISTRY }}/${{ env.ECR_REPO_NAME }}:$IMAGE_TAG"
          docker save "$AWS_IMAGE" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: operator-image
          path: image.tar
          retention-days: 1

  push-image:
    needs:
      - semantic_release
      - build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-image

      - name: Load image
        run: docker load < image.tar

      - name: Login to Amazon ECR
        uses: firebolt-analytics/gha-workflows/.github/actions/ecr-login@6c80e1ec32794898d18d86160862131160b4ceba # v3.3.1

      - name: Push image
        id: push_image
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
        run: |
          AWS_IMAGE="${{ env.AWS_CONTAINER_REGISTRY }}/${{ env.ECR_REPO_NAME }}:$IMAGE_TAG"
          docker push "$AWS_IMAGE"

          aws_digest=$(docker pull "$AWS_IMAGE" | grep ^Digest | awk '{ print $2 }')
          if [ -z "$aws_digest" ]; then
            echo "ERROR: cannot get digest for $AWS_IMAGE" 1>&2
            exit 1
          fi
          echo "aws_digest=$aws_digest" >> "$GITHUB_OUTPUT"
          echo "Pushed $AWS_IMAGE ($aws_digest)"

      - name: Sign image
        uses: firebolt-analytics/gha-workflows/.github/actions/cosign-image@6c80e1ec32794898d18d86160862131160b4ceba # v3.3.1
        with:
          ecr_repo_name: ${{ env.ECR_REPO_NAME }}
          image_digest: ${{ steps.push_image.outputs.aws_digest }}

      - name: Job summary
        env:
          IMAGE_TAG: ${{ needs.semantic_release.outputs.new_release_git_tag }}
          CHART_VERSION: ${{ needs.semantic_release.outputs.chart_version }}
        run: |
          echo "### Operator Release :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.AWS_CONTAINER_REGISTRY }}/${{ env.ECR_REPO_NAME }}:$IMAGE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App Version** | \`$IMAGE_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Chart Version** | \`$CHART_VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
