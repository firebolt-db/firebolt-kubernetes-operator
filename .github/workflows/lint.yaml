name: Lint

on:
  pull_request:

permissions: {}

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}

      - name: Configure Git for private modules
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Verify CRDs and JSON schemas are up to date
        run: |
          python3 -m pip install --user pyyaml
          make manifests
          if ! git diff --exit-code -- config/crd/bases helm/firebolt-operator-crds/json-schema; then
            echo "ERROR: CRD manifests or JSON schemas are out of date." 1>&2
            echo "       Run 'make manifests' locally and commit the result." 1>&2
            exit 1
          fi

      - name: Check operator docs navigation
        run: make docs-check

      - name: Run linter
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.5.0
        env:
          GOPRIVATE: github.com/firebolt-db/*

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint Helm chart
        run: make helm-lint

      - name: Validate Helm templates
        run: make helm-template > /dev/null

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Verify Helm chart READMEs are up to date
        run: |
          make helm-docs
          if ! git diff --exit-code -- helm/firebolt-operator/README.md helm/firebolt-operator-crds/README.md; then
            echo "ERROR: Helm chart README(s) are out of date." 1>&2
            echo "       Run 'make helm-docs' locally and commit the result." 1>&2
            exit 1
          fi
