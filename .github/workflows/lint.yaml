name: Lint

on:
  pull_request:

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Verify CRDs and JSON schemas are up to date
        run: |
          python3 -m pip install --user pyyaml
          make manifests
          if ! git diff --exit-code -- config/crd/bases helm/firebolt-operator-crds/json-schema helm/firebolt-operator-crds/templates helm/firebolt-operator/crds; then
            echo "ERROR: CRD manifests, JSON schemas, or chart CRDs are out of date." 1>&2
            echo "       Run 'make manifests' locally and commit the result." 1>&2
            exit 1
          fi

      - name: Check operator docs navigation
        run: make docs-check

      - name: Run linter
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.9.0
        env:
          GOPRIVATE: github.com/firebolt-db/*

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Lint Helm chart
        run: make helm-lint

      - name: Validate Helm templates
        run: make helm-template > /dev/null

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Verify Helm chart READMEs are up to date
        run: |
          make helm-docs
          if ! git diff --exit-code -- helm/firebolt-operator/README.md helm/firebolt-operator-crds/README.md; then
            echo "ERROR: Helm chart README(s) are out of date." 1>&2
            echo "       Run 'make helm-docs' locally and commit the result." 1>&2
            exit 1
          fi
