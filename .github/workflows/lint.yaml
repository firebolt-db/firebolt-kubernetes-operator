name: Lint

on:
  pull_request:

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate PR title
        if: ${{ !startsWith(github.head_ref, 'dependabot') && !startsWith(github.head_ref, 'release-please') }}
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6.1.1
        with:

          # List of allowed commit types
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test

          subjectPattern: ^[a-z0-9_].*\((#[0-9]+|[A-Z]+-[0-9]+)\)$
          requireScope: false
          validateSingleCommit: false
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}" didn't match the configured pattern.

            We follow [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/).
            Our CI is configured to forbidden PRs with titles that don't follow this standard.
            That's it, all commits landing in the `main` branch must be formatted in this way.
            Please make sure you read and understand this convention.

            The subject must not start with a capital letter, and must end with an issue
            reference in parentheses: either a GitHub issue like "(#123)" or a tracker
            ticket like "(FB-1234)".

      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Verify CRDs and JSON schemas are up to date
        run: |
          python3 -m pip install --user pyyaml
          make manifests
          if ! git diff --exit-code -- config/crd/bases helm/firebolt-operator-crds/json-schema helm/firebolt-operator-crds/templates helm/firebolt-operator/crds; then
            echo "ERROR: CRD manifests, JSON schemas, or chart CRDs are out of date." 1>&2
            echo "       Run 'make manifests' locally and commit the result." 1>&2
            exit 1
          fi

      - name: Check operator docs navigation
        run: make docs-check

      - name: Run linter
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.9.0
        env:
          GOPRIVATE: github.com/firebolt-db/*

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint Helm chart
        run: make helm-lint

      - name: Validate Helm templates
        run: make helm-template > /dev/null

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs
          helm-docs --version

      - name: Verify Helm chart READMEs are up to date
        run: |
          make helm-docs
          if ! git diff --exit-code -- helm/firebolt-operator/README.md helm/firebolt-operator-crds/README.md; then
            echo "ERROR: Helm chart README(s) are out of date." 1>&2
            echo "       Run 'make helm-docs' locally and commit the result." 1>&2
            exit 1
          fi
