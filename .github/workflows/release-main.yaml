---
# Release versioning uses release-please (release PRs on main, official releases
# on merge). Every main push also builds pre-release artifacts tagged
# {next}-pre.0.{utc-datetime}.{shortsha}. Official app releases build and push
# the operator image to GHCR (+ cosign); chart releases package and push the
# OCI charts to GHCR.
name: Release (main)

env:
  GHCR_IMAGE: ghcr.io/firebolt-db/firebolt-operator
  GHCR_REGISTRY: ghcr.io
  HELM_CHARTS_NAMESPACE: helm-charts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-main-${{ github.ref }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_paths: ${{ steps.detect.outputs.app_paths }}
      helm_paths: ${{ steps.detect.outputs.helm_paths }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: "false"
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/ci/detect-push-changes.sh
          scripts/ci/detect-push-changes.sh "$BEFORE_SHA" "$AFTER_SHA"

  release-please:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      app_release_created: ${{ steps.release.outputs.release_created }}
      app_tag_name: ${{ steps.release.outputs.tag_name }}
      app_version: ${{ steps.release.outputs.version }}
      helm_operator_release_created: ${{ steps.release.outputs['helm/firebolt-operator--release_created'] }}
      helm_crds_release_created: ${{ steps.release.outputs['helm/firebolt-operator-crds--release_created'] }}
      next_app_version: ${{ steps.versions.outputs.next_app_version }}
      next_helm_operator_version: ${{ steps.versions.outputs.next_helm_operator_version }}
      next_helm_crds_version: ${{ steps.versions.outputs.next_helm_crds_version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: "false"
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}
          permission-contents: write
          permission-pull-requests: write

      - name: Release Please
        uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4.1.1
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve next versions for pre-releases
        id: versions
        env:
          PRS_JSON: ${{ steps.release.outputs.prs || '[]' }}
        run: |
          chmod +x scripts/ci/resolve-next-release-version.sh
          {
            echo "next_app_version=$(scripts/ci/resolve-next-release-version.sh . "$PRS_JSON")"
            echo "next_helm_operator_version=$(scripts/ci/resolve-next-release-version.sh helm/firebolt-operator "$PRS_JSON")"
            echo "next_helm_crds_version=$(scripts/ci/resolve-next-release-version.sh helm/firebolt-operator-crds "$PRS_JSON")"
          } >> "$GITHUB_OUTPUT"

  pre-release-app:
    needs:
      - detect-changes
      - release-please
    if: >-
      needs.detect-changes.outputs.app_paths == 'true' &&
      needs.release-please.outputs.app_release_created != 'true' &&
      !startsWith(github.event.head_commit.message || '', 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: "false"
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}
          permission-contents: read

      - name: Compute pre-release tag
        id: pre
        run: |
          chmod +x scripts/ci/format-pre-release-tag.sh
          tag="$(scripts/ci/format-pre-release-tag.sh "${{ needs.release-please.outputs.next_app_version }}")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Pre-release app tag: $tag"

      - name: Build pre-release image
        # Pre-release images are CI artifacts only and are not pushed to GHCR.
        env:
          IMAGE_TAG: ${{ steps.pre.outputs.tag }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FULL_IMAGE="${{ env.GHCR_IMAGE }}:$IMAGE_TAG"
          git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com".insteadOf "https://github.com"
          make docker-build IMG="$FULL_IMAGE" VERSION="$IMAGE_TAG"
          echo "Built pre-release image $FULL_IMAGE (not pushed)"

      - name: Pre-release summary
        env:
          TAG: ${{ steps.pre.outputs.tag }}
          NEXT_VERSION: ${{ needs.release-please.outputs.next_app_version }}
        run: |
          {
            echo "### App pre-release (build only) :package:"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Next app version** | \`${NEXT_VERSION}\` |"
            echo "| **Pre-release tag** | \`${TAG}\` |"
            echo "| **Image (not pushed)** | \`${{ env.GHCR_IMAGE }}:${TAG}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  release-app:
    needs:
      - detect-changes
      - release-please
    if: needs.release-please.outputs.app_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: "false"
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}
          permission-contents: read

      - name: Resolve image tag
        id: tag
        # The operator image tag is `v<version>` (matching the chart appVersion
        # the chart defaults image.tag to), not the component-scoped git release
        # tag (`firebolt-operator-v<version>`) release-please creates.
        run: |
          VERSION="${{ needs.release-please.outputs.app_version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(tr -d '[:space:]' < version.txt)"
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FULL_IMAGE="${{ env.GHCR_IMAGE }}:$IMAGE_TAG"
          git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com".insteadOf "https://github.com"
          make docker-build IMG="$FULL_IMAGE" VERSION="$IMAGE_TAG"
          docker save "$FULL_IMAGE" -o image.tar
          echo "Built release image $FULL_IMAGE"

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operator-image
          path: image.tar
          retention-days: 1

  push-image:
    needs:
      - release-please
      - release-app
    if: needs.release-please.outputs.app_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-image

      - name: Load image
        run: docker load < image.tar

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: push_image
        env:
          IMAGE_TAG: ${{ needs.release-app.outputs.tag }}
        run: |
          FULL_IMAGE="${{ env.GHCR_IMAGE }}:$IMAGE_TAG"
          LATEST_IMAGE="${{ env.GHCR_IMAGE }}:latest"
          docker tag "$FULL_IMAGE" "$LATEST_IMAGE"
          docker push "$FULL_IMAGE"
          docker push "$LATEST_IMAGE"

          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$FULL_IMAGE" 2>/dev/null \
            | cut -d@ -f2)
          if [ -z "$digest" ]; then
            digest=$(docker pull "$FULL_IMAGE" | grep ^Digest | awk '{ print $2 }')
          fi
          if [ -z "$digest" ]; then
            echo "ERROR: cannot get digest for $FULL_IMAGE" 1>&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Pushed $FULL_IMAGE and $LATEST_IMAGE ($digest)"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.push_image.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.GHCR_IMAGE }}@${DIGEST}"

      - name: Job summary
        env:
          IMAGE_TAG: ${{ needs.release-app.outputs.tag }}
          APP_TAG: ${{ needs.release-please.outputs.app_tag_name }}
        run: |
          {
            echo "### Operator release image push :rocket:"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Image** | \`${{ env.GHCR_IMAGE }}:${IMAGE_TAG}\` |"
            echo "| **Latest tag** | \`${{ env.GHCR_IMAGE }}:latest\` |"
            echo "| **Release tag** | \`${APP_TAG}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  pre-release-helm:
    needs:
      - detect-changes
      - release-please
    if: >-
      needs.detect-changes.outputs.helm_paths == 'true' &&
      needs.release-please.outputs.helm_operator_release_created != 'true' &&
      needs.release-please.outputs.helm_crds_release_created != 'true' &&
      !startsWith(github.event.head_commit.message || '', 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: "false"
          persist-credentials: false

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "latest"

      - name: Compute pre-release chart versions
        id: pre
        run: |
          chmod +x scripts/ci/format-pre-release-tag.sh
          op="$(scripts/ci/format-pre-release-tag.sh "${{ needs.release-please.outputs.next_helm_operator_version }}")"
          crds="$(scripts/ci/format-pre-release-tag.sh "${{ needs.release-please.outputs.next_helm_crds_version }}")"
          {
            echo "operator_version=$op"
            echo "crds_version=$crds"
          } >> "$GITHUB_OUTPUT"

      - name: Package pre-release charts
        # Pre-release charts are CI artifacts only and are not pushed to GHCR.
        # The pre-release suffix goes on the chart --version only. appVersion is
        # deliberately left as committed in Chart.yaml: the chart defaults
        # image.tag to appVersion, so it must stay a real released operator image
        # tag. Overriding appVersion with a chart-version pre-tag would point the
        # chart at an operator image that is never built.
        run: |
          mkdir -p /tmp/helm-packages
          helm package helm/firebolt-operator --destination /tmp/helm-packages \
            --version "${{ steps.pre.outputs.operator_version }}"
          helm package helm/firebolt-operator-crds --destination /tmp/helm-packages \
            --version "${{ steps.pre.outputs.crds_version }}"
          echo "Packaged: $(ls /tmp/helm-packages)"

      - name: Pre-release summary
        env:
          OPERATOR_VERSION: ${{ steps.pre.outputs.operator_version }}
          CRDS_VERSION: ${{ steps.pre.outputs.crds_version }}
        run: |
          {
            echo "### Helm chart pre-release (package only) :package:"
            echo ""
            echo "| Chart | Next chart version | Pre-release chart version |"
            echo "|-------|--------------------|---------------------------|"
            echo "| \`firebolt-operator\` | \`${{ needs.release-please.outputs.next_helm_operator_version }}\` | \`${OPERATOR_VERSION}\` |"
            echo "| \`firebolt-operator-crds\` | \`${{ needs.release-please.outputs.next_helm_crds_version }}\` | \`${CRDS_VERSION}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  sync-chart-appversion:
    needs:
      - release-please
      - release-app
      - push-image
    if: needs.release-please.outputs.app_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: "false"
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.GH_APP_FB_DB_CI_WRITER_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_FB_DB_CI_WRITER_APP_KEY_PEM }}
          permission-contents: write

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "latest"

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin helm-docs

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Sync chart appVersion to released operator image
        # Charts are release-please components: release-please owns each chart's
        # `version` and the `.release-please-manifest.json` entries. This job only
        # rewrites `appVersion` (the operator image tag the chart ships) and commits
        # it as a conventional `chore(deps):` change -- the chart's bundled operator
        # image is a dependency, and that scope renders under the "Dependencies"
        # changelog section (release-please-config.json) while still being releasable.
        # That commit flows back through release-please, which opens the chart release
        # PRs; merging those is what bumps each chart `version` and publishes the chart
        # (release-helm-standalone). release-please cannot reference another
        # component's version itself (googleapis/release-please#2655), so this minimal
        # glue is required -- but it never touches chart `version` or the manifest, so
        # it does not compete with release-please for ownership of chart versions.
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_VERSION="$(tr -d '[:space:]' < version.txt)"
          APP_VERSION_TAG="v${APP_VERSION}"

          yq -i ".appVersion = \"${APP_VERSION_TAG}\"" helm/firebolt-operator/Chart.yaml
          yq -i ".appVersion = \"${APP_VERSION_TAG}\"" helm/firebolt-operator-crds/Chart.yaml

          make helm-docs

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/firebolt-operator/Chart.yaml \
                  helm/firebolt-operator/README.md \
                  helm/firebolt-operator-crds/Chart.yaml \
                  helm/firebolt-operator-crds/README.md

          if git diff --staged --quiet; then
            echo "Chart appVersion already ${APP_VERSION_TAG}; nothing to commit."
            COMMITTED=false
          else
            git commit -m "chore(deps): set chart appVersion to ${APP_VERSION_TAG}"
            git push "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
            COMMITTED=true
          fi

          {
            echo "### Chart appVersion sync :link:"
            echo ""
            if [ "$COMMITTED" = "true" ]; then
              echo "Committed \`chore(deps): set chart appVersion to ${APP_VERSION_TAG}\` to \`main\`."
              echo "release-please will open chart release PRs that bump each chart \`version\`;"
              echo "merging them publishes the charts (\`release-helm-standalone\`)."
            else
              echo "Chart \`appVersion\` was already \`${APP_VERSION_TAG}\`; no chart release needed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-helm-standalone:
    needs:
      - detect-changes
      - release-please
    # Sole chart publisher. Runs whenever release-please cuts a chart release (a
    # chart release PR merged), regardless of whether that PR originated from a
    # plain helm change or from the chore(deps) appVersion commit that an app release
    # produces. Stands down when an app release happens in the same run -- the app
    # run only opens the chart PRs (via sync-chart-appversion), it does not publish
    # charts itself. Keyed on the release_created outputs rather than a diff
    # heuristic so it is correct on workflow_dispatch too.
    if: >-
      needs.release-please.outputs.app_release_created != 'true' &&
      (
        needs.release-please.outputs.helm_operator_release_created == 'true' ||
        needs.release-please.outputs.helm_crds_release_created == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: "false"
          persist-credentials: false

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "latest"

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Login to GitHub Container Registry (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login "${{ env.GHCR_REGISTRY }}" --username "${GITHUB_ACTOR}" --password-stdin

      - name: Package and push charts
        run: |
          OPERATOR_VERSION="$(yq '.version' helm/firebolt-operator/Chart.yaml)"
          CRD_VERSION="$(yq '.version' helm/firebolt-operator-crds/Chart.yaml)"
          mkdir -p /tmp/helm-packages
          helm package helm/firebolt-operator --destination /tmp/helm-packages
          helm package helm/firebolt-operator-crds --destination /tmp/helm-packages
          REGISTRY="oci://${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.HELM_CHARTS_NAMESPACE }}"
          for tgz in /tmp/helm-packages/*.tgz; do
            helm push "$tgz" "$REGISTRY"
            echo "Pushed $(basename "$tgz") to $REGISTRY"
          done
          {
            echo "### Helm charts published :rocket:"
            echo ""
            echo "| Chart | Version | Registry |"
            echo "|-------|---------|----------|"
            echo "| \`firebolt-operator\` | \`${OPERATOR_VERSION}\` | \`${REGISTRY}\` |"
            echo "| \`firebolt-operator-crds\` | \`${CRD_VERSION}\` | \`${REGISTRY}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
