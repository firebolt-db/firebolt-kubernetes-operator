apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dedicated-pensieve.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dedicated-pensieve.labels" . | nindent 4 }}
data:
  config.xml: |
    <?xml version="1.0"?>
    <config>
      <pensieve_lite>
        <host>{{ .Values.server.host }}</host>
        <port>{{ .Values.server.port }}</port>
        <server_threads>{{ .Values.server.threads }}</server_threads>
        <log_level>{{ .Values.server.log_level }}</log_level>
        <metadata_storage>
          <postgresql>
            <!-- Connection settings (non-sensitive) -->
            <host>{{ .Values.postgresql.host }}</host>
            <port>{{ .Values.postgresql.port }}</port>
            <database>{{ .Values.postgresql.database }}</database>
            <schema>{{ .Values.postgresql.schema }}</schema>
            
            <!-- Credentials are provided via environment variables -->
            <!-- POSTGRES_USERNAME_FILE and POSTGRES_PASSWORD_FILE -->
            <!-- pointing to mounted secret files -->
            
            <!-- Connection tuning -->
            <keepalive>
              <enabled>{{ .Values.postgresql.keepalive.enabled }}</enabled>
              <idle_sec>{{ .Values.postgresql.keepalive.idle_sec }}</idle_sec>
              <interval_sec>{{ .Values.postgresql.keepalive.interval_sec }}</interval_sec>
              <count>{{ .Values.postgresql.keepalive.count }}</count>
            </keepalive>
            <connect_timeout_sec>{{ .Values.postgresql.connect_timeout_sec }}</connect_timeout_sec>
          </postgresql>
          <garbage_collection>
            <enabled>true</enabled>
            <interval_seconds>3600</interval_seconds>
            <max_age_seconds>86400</max_age_seconds>
          </garbage_collection>
        </metadata_storage>
      </pensieve_lite>
    </config>

