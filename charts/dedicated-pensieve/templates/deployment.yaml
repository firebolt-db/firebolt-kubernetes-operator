apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dedicated-pensieve.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dedicated-pensieve.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dedicated-pensieve.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/configmap.yaml") . | sha1sum }}
        checksum/secret: {{ include (print .Template.BasePath "/secret.yaml") . | sha1sum }}
      labels:
        {{- include "dedicated-pensieve.labels" . | nindent 8 }}
        {{- with .Values.extra_pod_labels }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.deployment.terminationGracePeriodSeconds }}
      containers:
        - name: dedicated-pensieve
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command: ["/dedicated-pensieve", "--config", "/configs/config.xml"]
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: grpc
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /configs
              readOnly: true
            - name: postgres-creds
              mountPath: {{ .Values.postgresql.credentials.mountPath }}
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.deployment.securityContext | nindent 12 }}
          env:
            # PostgreSQL credentials provided via environment variables
            # pointing to files mounted from Kubernetes Secret
            - name: POSTGRES_USERNAME_FILE
              value: {{ .Values.postgresql.credentials.mountPath }}/username
            - name: POSTGRES_PASSWORD_FILE
              value: {{ .Values.postgresql.credentials.mountPath }}/password
          {{- with .Values.extra_env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "dedicated-pensieve.fullname" . }}
        - name: postgres-creds
          secret:
            secretName: {{ .Values.postgresql.credentials.existingSecret | default (printf "%s-postgres-creds" (include "dedicated-pensieve.fullname" .)) }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

