# Example values file demonstrating secure credential management
# This file shows the recommended configuration for production deployments

image:
  repository: 000000000000.dkr.ecr.us-east-1.amazonaws.com/dedicated-pensieve
  tag: 1.0.0
  sha: ""

service:
  type: ClusterIP
  port: 9090
  targetPort: 9090

deployment:
  terminationGracePeriodSeconds: 30
  securityContext:
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 1Gi

server:
  host: 0.0.0.0
  port: 9090
  threads: 0
  log_level: information

# ============================================================================
# PostgreSQL Configuration with Secure Credential Management
# ============================================================================

postgresql:
  # Non-sensitive connection settings (safe to put in ConfigMap)
  host: "postgres.example.com"
  port: 5432
  database: "dedicated_pensieve"
  schema: "public"
  
  # Connection tuning
  keepalive:
    enabled: 1
    idle_sec: 120
    interval_sec: 30
    count: 5
  connect_timeout_sec: 5
  
  # ============================================================================
  # Credential Management (SENSITIVE DATA)
  # ============================================================================
  # 
  # DESIGN: Credentials are ALWAYS provided via Secret mounted as files
  #         ConfigMap NEVER contains any credential information
  #         ENV vars point to file paths for maximum flexibility
  #
  credentials:
    # Path where secret will be mounted in the container
    # ENV vars POSTGRES_USERNAME_FILE and POSTGRES_PASSWORD_FILE will point here
    mountPath: /secrets/postgres
    
    # ========================================================================
    # OPTION 1: Use Existing Secret (RECOMMENDED for Production)
    # ========================================================================
    # If set, chart will NOT create a secret and will use this one instead
    # Perfect for:
    #   - External Secrets Operator (Vault, AWS Secrets Manager, etc.)
    #   - Manually created secrets
    #   - Secrets managed by CI/CD
    #
    existingSecret: ""
    # Example:
    # existingSecret: "my-postgres-credentials"
    
    # ========================================================================
    # OPTION 2: Create Secret from Values (for Dev/Testing)
    # ========================================================================
    # These are ONLY used if existingSecret is empty
    # IMPORTANT: Never commit credentials to git!
    #            Pass via --set flags or separate gitignored values file
    #
    username: "pensieve_user"
    password: "CHANGE_ME_IN_PRODUCTION"


# ============================================================================
# Example 1: Development with inline credentials
# ============================================================================
# helm install dev-pensieve ./dedicated-pensieve \
#   --set postgresql.host=localhost \
#   --set postgresql.database=dev_db \
#   --set postgresql.credentials.username=dev_user \
#   --set postgresql.credentials.password=dev_pass


# ============================================================================
# Example 2: Production with existing secret
# ============================================================================
# # First create or use existing secret:
# kubectl create secret generic my-postgres-creds \
#   --from-literal=username=prod_user \
#   --from-literal=password=secure_password
#
# # Then deploy:
# helm install prod-pensieve ./dedicated-pensieve \
#   --set postgresql.host=prod-postgres.aws.com \
#   --set postgresql.database=prod_db \
#   --set postgresql.credentials.existingSecret=my-postgres-creds


# ============================================================================
# Example 3: Production with External Secrets Operator
# ============================================================================
# # Create ExternalSecret that pulls from Vault/AWS/GCP:
# apiVersion: external-secrets.io/v1
# kind: ExternalSecret
# metadata:
#   name: postgres-from-vault
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: vault-backend
#     kind: SecretStore
#   target:
#     name: dedicated-pensieve-postgres-creds
#   data:
#     - secretKey: username
#       remoteRef:
#         key: prod/dedicated-pensieve/postgres
#         property: username
#     - secretKey: password
#       remoteRef:
#         key: prod/dedicated-pensieve/postgres
#         property: password
#
# # Then deploy:
# helm install prod-pensieve ./dedicated-pensieve \
#   --set postgresql.host=prod-postgres.aws.com \
#   --set postgresql.database=prod_db \
#   --set postgresql.credentials.existingSecret=dedicated-pensieve-postgres-creds


# ============================================================================
# Example 4: Custom mount path
# ============================================================================
# helm install pensieve ./dedicated-pensieve \
#   --set postgresql.host=postgres.example.com \
#   --set postgresql.database=mydb \
#   --set postgresql.credentials.mountPath=/var/run/secrets/db \
#   --set postgresql.credentials.existingSecret=my-secret


# ============================================================================
# Security Best Practices
# ============================================================================
# 
# 1. ConfigMap contains ZERO credential information (not even file paths!)
# 2. Credentials flow: Values → Secret → Files → ENV vars → Application
# 3. ENV vars (POSTGRES_USERNAME_FILE, POSTGRES_PASSWORD_FILE) point to files
# 4. Files have 0400 permissions (read-only for owner)
# 5. Mount path is configurable, no hardcoded paths in config
# 6. Works seamlessly with any secret management system
# 7. Backward compatible with legacy configurations
