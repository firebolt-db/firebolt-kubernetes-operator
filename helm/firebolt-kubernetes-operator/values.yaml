---
# Default values for firebolt-kubernetes-operator.

# -- Number of operator replicas.
replicaCount: 1

image:
  # -- Container image repository.
  repository: controller
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Secrets for pulling images from private registries.
imagePullSecrets: []

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full resource name.
fullnameOverride: ""

# -- Extra labels added to all operator manifests.
extraLabels: {}
# -- Extra annotations added to all operator manifests.
extraAnnotations: {}

# -- Extra labels added only to the operator pod.
podLabels: {}
# -- Extra annotations added only to the operator pod.
podAnnotations: {}

serviceAccount:
  # -- Whether to create a ServiceAccount.
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. for IRSA / Workload Identity).
  annotations: {}
  # -- The name of the ServiceAccount to use. If empty, a name is generated from the fullname template.
  name: ""

rbac:
  # -- Whether to create ClusterRole, ClusterRoleBinding, and leader-election RBAC resources.
  create: true

leaderElection:
  # -- Enable leader election for the controller manager.
  enabled: true

metrics:
  # -- Enable the metrics Service.
  enabled: true
  # -- Address the metrics endpoint binds to.
  bindAddress: ":8443"
  # -- Serve metrics via HTTPS with authn/authz.
  secure: true

webhook:
  # -- Enable the admission webhook server. When false, the operator is
  # started with `--enable-webhooks=false` and no webhook Service, port,
  # or cert mount is created. Left false by default so existing consumers
  # without a cert provisioner keep working.
  enabled: false
  # -- Port the webhook server listens on inside the container. Also used
  # as the port of the webhook Service. Only relevant when `enabled` is true.
  port: 9443
  # -- Path (inside the container) where the operator reads tls.crt and
  # tls.key. Passed to the operator as `--webhook-cert-path=<certDir>`.
  # Override only when mounting the certs at a different path via
  # `extraVolumes` / `extraVolumeMounts`.
  certDir: /tmp/k8s-webhook-server/serving-certs
  # -- Optional shortcut for the common case: name of an existing Secret
  # in the release namespace with keys `tls.crt` and `tls.key`. When set,
  # the chart mounts this Secret read-only at `webhook.certDir`. The Secret
  # itself is NOT created by this chart; provision it via cert-manager
  # Certificate, ExternalSecret, Vault Agent, etc. Leave empty to mount
  # certs via `extraVolumes` / `extraVolumeMounts` instead.
  certSecretName: ""

  # -- Static CA bundle (base64-encoded) for admission webhook clients.
  # Ignored when `webhookConfigurationAnnotations` drives CA injection via
  # a controller (cert-manager, etc.); use this as a last-resort manual
  # override when no injector is available.
  caBundle: ""

  # -- Extra annotations merged into every WebhookConfiguration rendered by
  # this chart. The standard way to wire automated CA injection, e.g.:
  #   cert-manager.io/inject-ca-from: <namespace>/<certificate-name>
  webhookConfigurationAnnotations: {}

  mutatingWebhookConfiguration:
    # -- Render the MutatingWebhookConfiguration for the FireboltInstance
    # defaulter. Only effective when `webhook.enabled` is also true.
    enabled: true
    # -- failurePolicy for the mutating webhook.
    # Defaults to Ignore because the defaulter only fills in an empty
    # spec.id (the controller has a fallback path, and the CRD enforces
    # id immutability via CEL), so admission should not be coupled to
    # operator availability.
    failurePolicy: Ignore
    # -- Max admission request timeout in seconds (k8s caps at 30).
    timeoutSeconds: 10

  validatingWebhookConfiguration:
    # -- Render the ValidatingWebhookConfiguration for FireboltInstance
    # validation (reserved keys, metadata replicas, external Postgres
    # secret presence). Only effective when `webhook.enabled` is also true.
    enabled: true
    # -- failurePolicy for the validating webhook.
    # Defaults to Fail so invalid CR writes are rejected rather than
    # silently admitted during operator outages.
    failurePolicy: Fail
    # -- Max admission request timeout in seconds (k8s caps at 30).
    timeoutSeconds: 10

# -- Address the health probe endpoint binds to.
healthProbeBindAddress: ":8081"

# -- Namespace to watch for FireboltEngine resources. Empty watches all namespaces.
watchNamespace: ""

# -- Priority class name for the operator pod.
priorityClassName: ""

# -- Additional CLI arguments passed to the operator binary.
additionalArgs: []

# -- Additional environment variables for the operator container.
additionalEnv: []

# -- CPU/memory resource requests and limits for the operator pod.
# @default -- requests: 10m/64Mi, limits: 500m/128Mi
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Extra volumes attached to the operator Pod. Rendered as-is into
# `pod.spec.volumes`. Useful for mounting externally-provisioned certs,
# custom CAs, config files, or sidecar outputs (Vault Agent, CSI
# secrets-store, projected service-account tokens, etc.).
extraVolumes: []

# -- Extra volume mounts for the operator container. Rendered as-is into
# `container.volumeMounts`. Pair each entry with an `extraVolumes` entry
# of the same `name`.
extraVolumeMounts: []

# -- Node selector for the operator pod.
nodeSelector: {}
# -- Tolerations for the operator pod.
tolerations: []
# -- Affinity rules for the operator pod.
affinity: {}
# -- Topology spread constraints for the operator pod.
topologySpreadConstraints: []
