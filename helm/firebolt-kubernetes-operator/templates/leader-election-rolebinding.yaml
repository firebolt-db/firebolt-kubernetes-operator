{{- if and .Values.rbac.create .Values.leaderElection.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "firebolt-operator.fullname" . }}-leader-election
  labels:
    {{- include "firebolt-operator.labels" . | nindent 4 }}
  {{- with .Values.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "firebolt-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "firebolt-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
