{{- if .Values.metrics.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "firebolt-operator.fullname" . }}-metrics
  labels:
    {{- include "firebolt-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
  {{- with .Values.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ports:
    - name: https
      port: {{ .Values.metrics.bindAddress | trimPrefix ":" | int }}
      protocol: TCP
      targetPort: {{ .Values.metrics.bindAddress | trimPrefix ":" | int }}
  selector:
    {{- include "firebolt-operator.selectorLabels" . | nindent 4 }}
    control-plane: controller-manager
{{- end }}
