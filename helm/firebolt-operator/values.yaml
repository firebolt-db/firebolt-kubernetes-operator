---
# Default values for firebolt-operator.

# -- Number of operator replicas.
replicaCount: 1

image:
  # -- Container image repository.
  repository: ghcr.io/firebolt-db/firebolt-operator
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Secrets for pulling images from private registries.
imagePullSecrets: []

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full resource name.
fullnameOverride: ""

# -- Extra labels added to all operator manifests.
extraLabels: {}
# -- Extra annotations added to all operator manifests.
extraAnnotations: {}

# -- Extra labels added only to the operator pod.
podLabels: {}
# -- Extra annotations added only to the operator pod.
podAnnotations: {}

# -- Pod-level security context. fsGroup matches the distroless-nonroot UID
# used by the default `controller` image so mounted Secret files (e.g. the
# webhook cert) are readable by the operator process.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 65532

serviceAccount:
  # -- Whether to create a ServiceAccount.
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. for IRSA / Workload Identity).
  annotations: {}
  # -- The name of the ServiceAccount to use. If empty, a name is generated from the fullname template.
  name: ""

rbac:
  # -- Whether to create ClusterRole, ClusterRoleBinding, and leader-election RBAC resources.
  create: true
  # -- Render an additional ClusterRole (or per-namespace Role when
  # `watchNamespaces` is set) granting only `pods/proxy: get`. Required
  # when any FireboltInstance opts into
  # `spec.metricScrapeMode=ApiserverProxy`; the default
  # `metricScrapeMode=PodIP` reaches engine metrics directly on the
  # pod IP and does not need this permission. Leaving this false while
  # an instance is set to `ApiserverProxy` makes the metric scrape
  # surface as a 403 from the apiserver.
  apiserverProxyGrant: false

# -- Chart-managed ClusterRole the operator binds to each FireboltInstance's
# gateway ServiceAccount (via a per-instance RoleBinding), granting
# `get/list/patch` on `compute.firebolt.io/fireboltengines` so the gateway can
# wake a stopped engine.
# @default -- {}
gatewayWakeClusterRole:
  # -- Render the ClusterRole. Set to false when supplying a pre-existing
  # ClusterRole via `gatewayWakeClusterRole.name` (e.g. one shared
  # between multiple operator releases or managed by a platform team).
  create: true
  # -- ClusterRole name. Empty defaults to `<release>-gateway-wake` (see
  # the `firebolt-operator.gatewayWakeClusterRoleName` helper). The same
  # value is passed to the operator via `--gateway-wake-cluster-role`,
  # so override here when using an externally managed ClusterRole.
  name: ""

leaderElection:
  # -- Enable leader election for the controller manager.
  enabled: true

metrics:
  # -- Enable the metrics Service.
  enabled: true
  # -- Address the metrics endpoint binds to.
  # Use ":8443" with secure: true (HTTPS) or ":8080" with secure: false (HTTP).
  bindAddress: ":8443"
  # -- Serve metrics via HTTPS with authn/authz. When true, controller-runtime
  # auto-generates self-signed TLS certs and enables Kubernetes authn/authz.
  # The operator ServiceMonitor automatically adapts scheme and TLS config.
  secure: true

webhook:
  # -- Enable the admission webhook server. When false, the operator is
  # started with `--enable-webhooks=false` and no webhook Service, port,
  # or cert mount is created. Left false by default so existing consumers
  # without a cert provisioner keep working.
  enabled: false
  # -- Port the webhook server listens on inside the container. Also used
  # as the port of the webhook Service. Only relevant when `enabled` is true.
  port: 9443
  # -- Path (inside the container) where the operator reads tls.crt and
  # tls.key. Passed to the operator as `--webhook-cert-path=<certDir>`.
  # Override only when mounting the certs at a different path via
  # `extraVolumes` / `extraVolumeMounts`.
  certDir: /tmp/k8s-webhook-server/serving-certs
  # -- Optional shortcut for the common case: name of an existing Secret
  # in the release namespace with keys `tls.crt` and `tls.key`. When set,
  # the chart mounts this Secret read-only at `webhook.certDir`. The Secret
  # itself is NOT created by this chart; provision it via cert-manager
  # Certificate, ExternalSecret, Vault Agent, etc. Leave empty to mount
  # certs via `extraVolumes` / `extraVolumeMounts` instead.
  certSecretName: ""

  # -- Static CA bundle (base64-encoded) for admission webhook clients.
  # Ignored when `webhookConfigurationAnnotations` drives CA injection via
  # a controller (cert-manager, etc.); use this as a last-resort manual
  # override when no injector is available.
  caBundle: ""

  # -- Extra annotations merged into every WebhookConfiguration rendered by
  # this chart. The standard way to wire automated CA injection, e.g.:
  #   cert-manager.io/inject-ca-from: <namespace>/<certificate-name>
  webhookConfigurationAnnotations: {}

  mutatingWebhookConfiguration:
    # -- Render the MutatingWebhookConfiguration for the FireboltInstance
    # defaulter. Only effective when `webhook.enabled` is also true.
    enabled: true
    # -- failurePolicy for the mutating webhook.
    # Defaults to Ignore because the defaulter only fills in an empty
    # spec.id (the controller has a fallback path, and the CRD enforces
    # id immutability via CEL), so admission should not be coupled to
    # operator availability.
    failurePolicy: Ignore
    # -- Max admission request timeout in seconds (k8s caps at 30).
    timeoutSeconds: 10

  validatingWebhookConfiguration:
    # -- Render the ValidatingWebhookConfiguration for FireboltInstance
    # validation (reserved keys, metadata replicas, external Postgres
    # secret presence) and FireboltEngineClass validation (operator-owned
    # pod template paths, deletion blocking while bound by FireboltEngines).
    # Only effective when `webhook.enabled` is also true.
    enabled: true
    # -- failurePolicy for the validating webhook.
    # Defaults to Fail so invalid CR writes are rejected rather than
    # silently admitted during operator outages. Critical for the
    # FireboltEngineClass deletion guard: with Ignore, an outage would open
    # a window in which a bound FireboltEngineClass could be deleted,
    # orphaning every engine that referenced it.
    failurePolicy: Fail
    # -- Max admission request timeout in seconds (k8s caps at 30).
    timeoutSeconds: 10

# -- Address the health probe endpoint binds to.
healthProbeBindAddress: ":8081"

# -- Namespaces the operator watches and the chart's manager RBAC is
# scoped to. Empty (the default) renders a cluster-wide install: one
# `ClusterRole` + `ClusterRoleBinding` for the manager, and the operator
# starts with `--namespaces=""` (controller-runtime watches every
# namespace). A non-empty list renders a `Role` + `RoleBinding` pair
# per listed namespace with the same rule set, and the operator starts
# with `--namespaces=<comma-list>` so its cache spans only those
# namespaces. Switching modes is a `helm upgrade` plus an operator
# restart.
watchNamespaces: []

# Upper bounds on FireboltEngine.spec.resources values. Each entry is a
# Kubernetes resource.Quantity that caps both Requests and Limits for the
# matching dimension. Empty disables that dimension's bound; the default
# leaves every dimension unbounded so existing installs are not broken
# by an upgrade. Bounds protect a namespace from accidentally admitting
# an engine whose requests would starve sibling workloads or whose
# limits would OOM the node. Enforced in two places: the validating
# webhook rejects offending CRs at admission time (synchronous,
# requires webhook.enabled: true), and the FireboltEngine controller
# stamps Ready=False/ResourceBoundsExceeded with the offending field
# path on any over-bound engine that slipped past admission (e.g.
# webhooks off). The controller-side check is the always-on backstop;
# enable the webhook for an immediate apply-time signal.
engineResourceBounds:
  # -- Maximum allowed FireboltEngine.spec.resources CPU (requests and limits).
  # Example: "32".
  maxCPU: ""
  # -- Maximum allowed FireboltEngine.spec.resources memory (requests and limits).
  # Example: "256Gi".
  maxMemory: ""
  # -- Maximum allowed FireboltEngine.spec.resources ephemeral-storage
  # (requests and limits). Example: "10Ti".
  maxEphemeralStorage: ""

logging:
  # -- Development mode (--zap-devel): console encoding, debug level, no sampling.
  # Use for local clusters; production installs should leave this false. When true,
  # encoder/level/stacktraceLevel below are not passed (zap dev defaults apply).
  development: false
  # -- Log encoding (json or console). Used when development is false.
  encoder: json
  # -- Minimum log level (debug, info, error). Used when development is false.
  level: info
  # -- Level at and above which stack traces are captured (info, error, panic).
  # Used when development is false. Dev mode defaults to warn internally but that
  # threshold is not configurable via --zap-stacktrace-level.
  stacktraceLevel: error

# -- Priority class name for the operator pod.
priorityClassName: ""

telemetry:
  # -- Send a once-daily anonymous aggregate usage event to Scarf. The event
  # contains operator/engine versions, Kubernetes minor, OS/architecture, and
  # bucketed instance/engine/replica counts. It contains no names, stable
  # identifiers, query data, schemas, or configuration. The source IP is visible
  # to Scarf for company inference but is not stored. Set false to disable;
  # DO_NOT_TRACK and SCARF_NO_ANALYTICS are also honored.
  enabled: true

# -- Additional CLI arguments passed to the operator binary.
additionalArgs: []

# -- Additional environment variables for the operator container.
additionalEnv: []

# -- CPU/memory resource requests and limits for the operator pod. Empty by
# default so the chart imposes no requests or limits; set them to match your
# cluster's scheduling and quota policy.
resources: {}

# -- Extra volumes attached to the operator Pod. Rendered as-is into
# `pod.spec.volumes`. Useful for mounting externally-provisioned certs,
# custom CAs, config files, or sidecar outputs (Vault Agent, CSI
# secrets-store, projected service-account tokens, etc.).
extraVolumes: []

# -- Extra volume mounts for the operator container. Rendered as-is into
# `container.volumeMounts`. Pair each entry with an `extraVolumes` entry
# of the same `name`.
extraVolumeMounts: []

podMonitor:
  # -- Create a PodMonitor for engine pods (port 9090, /metrics).
  engines:
    enabled: false
    interval: 15s
  # -- Create a PodMonitor for gateway pods (port 9090, /stats/prometheus).
  gateway:
    enabled: false
    interval: 15s
  # -- When true, PodMonitors discover pods across all namespaces.
  # Use when the operator watches multiple namespaces (watchNamespaces is empty).
  # When false, PodMonitors only discover pods in the release namespace.
  allNamespaces: false

serviceMonitor:
  # -- Create a ServiceMonitor that scrapes the operator's controller-manager
  # metrics Service (`<release>-metrics`). A ServiceMonitor is used (instead
  # of a PodMonitor) because the secure path (`metrics.secure: true`) needs
  # to authenticate to controller-runtime's built-in authn/authz, and only
  # `ServiceMonitor.endpoint.authorization` exposes a credential reference.
  operator:
    enabled: false
    interval: 15s
    # -- Secret holding the bearer token Prometheus presents to the
    # operator's metrics endpoint. Required when `metrics.secure: true`.
    # Bring your own Secret (e.g. an ESO/Vault-projected one, a
    # `kubernetes.io/service-account-token` Secret bound to your scrape SA,
    # or whatever your Prometheus install already uses); leave `name` empty
    # to render no authorization (the secure endpoint will reject scrapes).
    # @default -- {}
    bearerTokenSecret:
      name: ""
      key: token

# -- Node selector for the operator pod.
nodeSelector: {}
# -- Tolerations for the operator pod.
tolerations: []
# -- Affinity rules for the operator pod.
affinity: {}
# -- Topology spread constraints for the operator pod.
topologySpreadConstraints: []
