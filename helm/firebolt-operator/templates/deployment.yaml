apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "firebolt-operator.fullname" . }}
  labels:
    {{- include "firebolt-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
  {{- with .Values.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "firebolt-operator.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "firebolt-operator.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "firebolt-operator.serviceAccountName" . }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address={{ .Values.healthProbeBindAddress }}
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address={{ .Values.metrics.bindAddress }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- if .Values.metrics.secure }}
            - --metrics-secure=true
            {{- else }}
            - --metrics-secure=false
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - --enable-webhooks=true
            - --webhook-cert-path={{ .Values.webhook.certDir }}
            {{- else }}
            - --enable-webhooks=false
            {{- end }}
            {{- with .Values.watchNamespaces }}
            - --namespaces={{ join "," . }}
            {{- end }}
            {{- with .Values.engineResourceBounds.maxCPU }}
            - --engine-max-cpu={{ . }}
            {{- end }}
            {{- with .Values.engineResourceBounds.maxMemory }}
            - --engine-max-memory={{ . }}
            {{- end }}
            {{- with .Values.engineResourceBounds.maxEphemeralStorage }}
            - --engine-max-ephemeral-storage={{ . }}
            {{- end }}
            - --gateway-wake-cluster-role={{ include "firebolt-operator.gatewayWakeClusterRoleName" . }}
            {{- if eq .Values.telemetry.enabled false }}
            - --telemetry=false
            {{- end }}
            {{- if (.Values.logging.development | default false) }}
            - --zap-devel=true
            {{- else }}
            {{- with .Values.logging.encoder | default "json" }}
            - --zap-encoder={{ . }}
            {{- end }}
            {{- with .Values.logging.level | default "info" }}
            - --zap-log-level={{ . }}
            {{- end }}
            {{- with .Values.logging.stacktraceLevel | default "error" }}
            - --zap-stacktrace-level={{ . }}
            {{- end }}
            {{- end }}
            {{- with .Values.additionalArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.additionalEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          ports:
            - name: health
              containerPort: {{ include "firebolt-operator.portNumber" .Values.healthProbeBindAddress }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: {{ if .Values.metrics.secure }}https{{ else }}http{{ end }}
              containerPort: {{ include "firebolt-operator.portNumber" .Values.metrics.bindAddress }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook-server
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $webhookCertMount := and .Values.webhook.enabled .Values.webhook.certSecretName }}
          {{- if or .Values.extraVolumeMounts $webhookCertMount }}
          volumeMounts:
            {{- if $webhookCertMount }}
            - name: webhook-cert
              mountPath: {{ .Values.webhook.certDir }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.extraVolumes $webhookCertMount }}
      volumes:
        {{- if $webhookCertMount }}
        - name: webhook-cert
          secret:
            secretName: {{ .Values.webhook.certSecretName }}
            defaultMode: 0440
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
