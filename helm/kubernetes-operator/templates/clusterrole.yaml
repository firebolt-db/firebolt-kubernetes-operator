{{- /*
HAND-MAINTAINED. This ClusterRole must stay in sync with
config/rbac/role.yaml, which is generated from +kubebuilder:rbac:
markers on the controllers. When those markers change, update this
file too. Historical drift has bitten us twice (pods/proxy missing
after b284983, endpointslices dead since e538444); keep the rule
set minimal and matching the generated role exactly.
*/ -}}
{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "firebolt-operator.fullname" . }}-manager
  labels:
    {{- include "firebolt-operator.labels" . | nindent 4 }}
  {{- with .Values.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - serviceaccounts
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/proxy
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - compute.firebolt.io
    resources:
      - fireboltengines
      - fireboltinstances
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - compute.firebolt.io
    resources:
      - engineclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - compute.firebolt.io
    resources:
      - fireboltengines/finalizers
      - fireboltinstances/finalizers
    verbs:
      - update
  - apiGroups:
      - compute.firebolt.io
    resources:
      - engineclasses/status
      - fireboltengines/status
      - fireboltinstances/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
      - roles
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
{{- end }}
