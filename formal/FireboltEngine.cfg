\* TLC model-checking configuration for FireboltEngine.tla
\*
\* Run with:
\*   java -jar tla2tools.jar -config FireboltEngine.cfg FireboltEngine.tla
\*
\* Or in the TLA+ Toolbox: File > Open Spec, then Model > New Model.
\*
\* Bounds:
\*   MaxGen=2  gives generations 0,1,2  (covers 2 full rollouts + 1 spec-change mid-flight)
\*   MaxSpec=3 gives spec versions 0..3 (covers 2 spec changes mid-creating)
\*
\* Expected TLC runtime: < 30 seconds on a laptop at these bounds.
\* Raise to MaxGen=3, MaxSpec=4 for deeper exploration (~5 minutes).

CONSTANTS
