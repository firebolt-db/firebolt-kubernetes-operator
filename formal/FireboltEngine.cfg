\* TLC model-checking configuration for FireboltEngine.tla
\*
\* Run with:
\*   java -jar tla2tools.jar -config FireboltEngine.cfg FireboltEngine.tla
\*
\* Or in the TLA+ Toolbox: File > Open Spec, then Model > New Model.
\*
\* Bounds:
\*   MaxGen=3  gives generations 0..3 (covers 3 full rollouts)
\*   MaxSpec=4 gives spec versions 0..4 (covers 3 spec changes mid-creating)
\*
\* Expected TLC runtime: ~2 seconds on a laptop. The deeper bounds explore
\* ~3,200 reachable states (vs ~1,400 at MaxGen=2/MaxSpec=3) for negligible
\* extra time, so there is no separate "shallow vs deep" config.

CONSTANTS
    MaxGen = 3
    MaxSpec = 4

SPECIFICATION Spec

INVARIANTS
    Safety

PROPERTIES
    EventuallyTerminal
