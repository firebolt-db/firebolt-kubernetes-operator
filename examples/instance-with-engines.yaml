# One Instance shared by two Engines: a typical pattern for separating
# query workloads (analytics) from data ingestion (ingest).
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata: {}
  gateway: {}
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: analytics
spec:
  instanceRef: firebolt
  replicas: 2
  resources:
    cpu: "2"
    memory: 8Gi
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: ingest
spec:
  instanceRef: firebolt
  replicas: 1
  resources:
    cpu: "1"
    memory: 4Gi
