# A FireboltEngineClass with every supported field set. Most are optional.
#
# A FireboltEngineClass holds settings shared by multiple FireboltEngines in
# the same namespace, referenced via spec.engineClassRef. It carries a
# reusable pod-template fragment — most notably the cloud-provider IAM
# binding (kube2iam pod annotation / IRSA service account / Pod Identity)
# identical for every engine of one instance — plus defaults for a subset
# of non-template engine settings: uiSidecar, storage, customEngineConfig,
# rollout, drainCheckEnabled, drainCheckInterval, and autoStop.
#
# FireboltEngineClass is namespaced (not cluster-scoped). The template
# carries namespace-resolved identifiers — ServiceAccount names, Secret /
# ConfigMap / PVC volume references, per-tenant IAM annotations — that
# Kubernetes resolves in the engine's own namespace at pod admission
# time. Co-locating the class and its consumer engines avoids the
# silent-divergence trap a cluster-scoped class would have (same SA
# name in two namespaces, possibly different IAM roles).
#
# Every field resolves engine-if-set → class-if-set → operator default: an
# engine that sets the field owns it, the class fills it in otherwise, and
# the operator default sits beneath both. For the pod template the merge is
# per-field:
#   operator defaults < FireboltEngineClass.spec.template < FireboltEngine.spec.template
# storage and autoStop are whole-struct (an engine that sets the field
# owns it); customEngineConfig is deep-merged with engine keys winning.
#
# The same allowlist applies to both FireboltEngineClass.spec.template
# and FireboltEngine.spec.template: the validating webhook refuses
# anything that touches the engine container's hardcoded identity (name,
# command, ports, probes, reserved env keys), pod-level fields tied to the
# StatefulSet contract (terminationGracePeriodSeconds, subdomain,
# hostname, restartPolicy, activeDeadlineSeconds), or label/annotation
# keys under the firebolt.io/ prefix. Sidecar containers and additional
# init containers are fully user-owned.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngineClass
metadata:
  name: compute-optimized
  namespace: firebolt
spec:
  template:
    metadata:
      # Pod annotations on every engine pod. kube2iam reads its IAM
      # binding from here. Operator-managed annotations under
      # firebolt.io/ are reserved and rejected by the FireboltEngineClass webhook.
      annotations:
        iam.amazonaws.com/role: arn:aws:iam::123456789012:role/firebolt-engine
        prometheus.io/scrape: "true"
      # Pod labels added to every engine pod (in addition to the
      # operator-managed firebolt.io/engine and firebolt.io/generation
      # labels, which cannot be overridden).
      labels:
        team: data
    spec:
      # ServiceAccountName is the IRSA / Pod-Identity binding point.
      # Engines whose own spec.template.spec.serviceAccountName is set
      # override this.
      serviceAccountName: firebolt-engine
      # Scheduling: every engine that references this class lands on
      # the same node pool. nodeSelector keys merge with the engine's
      # own spec.template.spec.nodeSelector (engine keys win on conflict).
      nodeSelector:
        firebolt.dev/pool: engine-compute
      tolerations:
        - key: firebolt.dev/pool
          operator: Equal
          value: engine-compute
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: firebolt.dev/pool
                    operator: In
                    values: ["engine-compute"]
      # The operator-owned engine container, named "engine". Setting
      # image here is the canonical way to roll a new engine version
      # for every engine referencing this class — the operator picks
      # it up on the next reconcile and rolls a blue-green generation
      # on each consumer engine.
      containers:
        - name: engine
          image: ghcr.io/firebolt-db/engine:latest
          imagePullPolicy: IfNotPresent
        # Sidecar containers (anything not named "engine") pass through
        # verbatim — image, command, ports, env, mounts. They share
        # the pod lifecycle with the engine container.
        - name: log-shipper
          image: fluent/fluent-bit:latest
      # Init containers run before the engine container starts.
      initContainers:
        - name: cache-warmer
          image: busybox:1.36
          command: ["sh", "-c", "echo warming cache"]
  # --- Non-template defaults (siblings of template) ---
  # Each is inherited by referencing engines that leave the matching
  # spec field unset.
  #
  # Inject a built-in Core UI sidecar (the "core-ui" nginx container,
  # reachable on container port 9100) into every engine pod. Skipped on any
  # engine that already supplies its own "core-ui" container. Toggling this
  # reshapes the pod, so it rolls a new blue-green generation.
  uiSidecar: true
  #
  # Default per-pod data volume. An engine that declares its own
  # spec.storage backend (persistentVolumeClaim / emptyDir / hostPath)
  # overrides this wholesale.
  storage:
    persistentVolumeClaim:
      size: 100Gi
      accessModes: [ReadWriteOnce]
      # storageClassName: gp3
  # Engine config.yaml fragment, deep-merged beneath each engine's own
  # spec.customEngineConfig (engine keys win on conflict). Operator-owned
  # paths (schema_version, instance.*, engine.id/nodes/...) are stripped.
  customEngineConfig:
    logging:
      level: info
  # Default rollout strategy. graceful drains in-flight queries off the
  # old generation before removing its pods; recreate skips the drain.
  rollout: graceful
  # Drain-check defaults, used during graceful rollouts.
  drainCheckEnabled: true
  drainCheckInterval: 5s
  # Default autoStop policy. Whole-struct: an engine that sets
  # spec.autoStop owns the entire policy (no field-merge with this).
  autoStop:
    enabled: true
    activeReplicas: 5
    idleReplicas: 0
    idleTimeout: 30m
---
# A FireboltEngine that inherits IAM, scheduling, image, storage, engine
# config, rollout, and autoStop from the class via spec.engineClassRef.
# Per-engine resources live on spec.template and ride above the class
# template in the merge order, so the values below override anything the
# class defines for the engine container's resources block.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: analytics
  namespace: firebolt
spec:
  instanceRef: firebolt
  engineClassRef: compute-optimized
  replicas: 3
  template:
    spec:
      containers:
        - name: engine
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              memory: 16Gi
