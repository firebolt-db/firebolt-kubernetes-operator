# FireboltInstance with every supported field set. Most are optional;
# the operator picks defaults when omitted.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata:
    # External Postgres for metadata storage. Omit to use an operator-managed instance.
    postgres:
      host: postgres.firebolt.svc
      port: 5432
      database: firebolt_metadata
      credentialsSecretRef:
        name: metadata-postgres-credentials
    engineRegistration: true
    # Omit image to use the operator default (metadata service image from config/images).
    image:
      repository: ghcr.io/firebolt-db/metadata
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi
    nodeSelector:
      firebolt.dev/pool: system
    serviceAccountName: metadata

  gateway:
    replicas: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    nodeSelector:
      firebolt.dev/pool: system

  # Reserved: persisted but not yet enforced at the engine level.
  auth:
    mode: openid
    oidc:
      issuerURL: https://company.okta.com/oauth2/default
      clientID: firebolt
      clientSecretRef:
        name: oidc-client-secret
      claimMappings:
        username: email
