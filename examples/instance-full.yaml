apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: full
spec:
  metadata:
    postgres:
      host: "postgres.firebolt.svc"
      port: 5432
      database: "firebolt_metadata"
      credentialsSecretRef:
        name: metadata-postgres-credentials
    engineRegistration: true
    resources:
      requests:
        cpu: "200m"
        memory: "1Gi"
      limits:
        memory: "2Gi"
    nodeSelector:
      firebolt.dev/pool: system
    serviceAccountName: metadata

  gateway:
    replicas: 3
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
    nodeSelector:
      firebolt.dev/pool: system

  # Auth is not enforced yet; reserved for future engine-level auth.
  auth:
    mode: openid
    oidc:
      issuerURL: "https://company.okta.com/oauth2/default"
      clientID: "firebolt"
      clientSecretRef:
        name: oidc-client-secret
      claimMappings:
        username: "email"
