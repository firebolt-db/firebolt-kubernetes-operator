apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: production
  namespace: firebolt
spec:
  metadata:
    postgres:
      host: "postgres.firebolt.svc"
      port: 5432
      database: "firebolt_metadata"
      credentialsSecretRef:
        name: metadata-postgres-credentials
    engineRegistration: true
    image:
      repository: "ghcr.io/firebolt-analytics/dedicated-pensieve"
      tag: "1.0.0"
    resources:
      requests:
        cpu: "200m"
        memory: "1Gi"
      limits:
        memory: "2Gi"
    nodeSelector:
      firebolt.dev/pool: system
    serviceAccountName: metadata
    valuesOverride:
      server:
        log_level: information
        threads: 4

  gateway:
    replicas: 3
    image:
      repository: "ghcr.io/firebolt-analytics/core-gateway"
      tag: "1.0.0"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
    nodeSelector:
      firebolt.dev/pool: system

  auth:
    mode: openid
    oidc:
      issuerURL: "https://company.okta.com/oauth2/default"
      clientID: "firebolt"
      clientSecretRef:
        name: oidc-client-secret
      claimMappings:
        username: "email"
