# FireboltInstance with every supported field set. Most are optional;
# the operator picks defaults when omitted.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metadata
---
apiVersion: v1
kind: Secret
metadata:
  name: metadata-postgres-credentials
type: Opaque
stringData:
  username: testuser
  password: testpass
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata:
    # External Postgres for metadata storage. Omit to use an operator-managed instance.
    postgres:
      host: postgres.firebolt.svc
      port: 5432
      database: firebolt_metadata
      credentialsSecretRef:
        name: metadata-postgres-credentials
    engineRegistration: true
    # All pod scheduling, the container image, resources, and the
    # serviceAccount live on a pod template. The operator stamps the
    # command, ports, probes, securityContext, and reserved volume
    # mounts on top; the validating webhook rejects user input on any
    # of those (see docs/crd-reference/instance-crd-reference.mdx).
    template:
      spec:
        serviceAccountName: metadata
        nodeSelector:
          firebolt.dev/pool: system
        containers:
          - name: metadata
            # Omit image to use the operator default.
            image: ghcr.io/firebolt-db/metadata:latest
            imagePullPolicy: IfNotPresent
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 2Gi

  gateway:
    replicas: 2
    # Same pod-template pattern as metadata above. Only image and
    # resources on the operator-rendered "envoy" container are user-
    # settable; the validating webhook rejects user input on
    # Envoy's args / ports / probes / preStop / reserved volume
    # mounts.
    template:
      spec:
        nodeSelector:
          firebolt.dev/pool: system
        containers:
          - name: envoy
            resources:
              requests:
                cpu: 100m
                memory: 256Mi

  # Auth is Instance-wide: every engine in this Instance renders the same
  # instance.auth.* config and shares the same JWT signing key, because
  # packdb's embedded authorization server on each engine both issues and
  # validates tokens. Signing keys and TLS certs are always provisioned
  # via cert-manager; there is no bring-your-own-Secret option.
  auth:
    enabled: true
    # Clients that don't pick an authorization server explicitly default
    # to this one. Must be "_local" or one of oidc.providers[].name.
    preferredAuthorizationServer: okta
    local:
      passwordLogin: admin_only
      admin:
        name: firebolt
        password:
          name: firebolt-admin-credentials
          key: password
      signingAlgorithm: RS256
      signingKeys:
        certManager:
          issuerRef:
            name: internal-ca
            kind: ClusterIssuer
          algorithm: RSA
          size: 2048
    oidc:
      providers:
        - name: okta
          title: Okta
          discoveryURL: https://company.okta.com/oauth2/default/.well-known/openid-configuration
          usernameMapping: "{{ email }}"
          jitProvisioning:
            enabled: true
            defaultRoles: [public]

  # TLS certs are also cert-manager-only.
  #
  # tls.engine: enabling it replaces every engine's plaintext http-query
  # listener with TLS-only on the same port, and the gateway automatically
  # re-encrypts its upstream connection to engines using the same
  # certificate's CA.
  #
  # tls.gateway: enabling it terminates TLS on the gateway's client-facing
  # listener. The certificate always covers the gateway's in-cluster
  # Service DNS names automatically; dnsNames below is only needed for
  # names a client outside the cluster will present at the handshake (a
  # custom domain, an external load balancer's hostname) — the gateway has
  # no operator-managed external entrypoint, so the operator cannot infer
  # those on its own. Omit dnsNames entirely for in-cluster-only access.
  tls:
    engine:
      enabled: true
      certManager:
        issuerRef:
          name: internal-ca
          kind: ClusterIssuer
    gateway:
      enabled: true
      certManager:
        issuerRef:
          name: internal-ca
          kind: ClusterIssuer
      dnsNames:
        - firebolt.example.com
