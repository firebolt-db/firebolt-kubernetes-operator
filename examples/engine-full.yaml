apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata: {}
  gateway: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: firebolt-engine
---
# FireboltEngine with every supported field set. Most are optional and have defaults.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: engine
spec:
  instanceRef: firebolt
  replicas: 5

  # Dedicated ServiceAccount for pods (see manifest above). Bind RBAC as needed.
  serviceAccountName: firebolt-engine

  # Image override. When omitted, the operator's embedded default is used.
  image:
    repository: ghcr.io/firebolt-db/engine
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 4Gi

  # Per-replica PersistentVolumeClaim. Changing storage
  # triggers a blue-green rollout. Omit storage entirely for operator defaults (1Gi, ReadWriteOnce, cluster default StorageClass).
  storage:
    size: 100Gi
    accessModes:
      - ReadWriteOnce
    # storageClassName: gp3-high-perf

  # Rollout behaviour
  rollout: graceful                 # graceful (default) | recreate
  drainCheckEnabled: true
  drainCheckInterval: 10s
  terminationGracePeriodSeconds: 60

  # Scheduling
  nodeSelector:
    firebolt.dev/pool: engine
    topology.kubernetes.io/zone: us-east-1a
  tolerations:
    - key: firebolt.dev/pool
      operator: Equal
      value: engine
      effect: NoSchedule
