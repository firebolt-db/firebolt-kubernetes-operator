apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: full
spec:
  metadata: {}
  gateway: {}
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: core-engine-production
spec:
  instanceRef: full
  replicas: 5
  image:
    pullPolicy: IfNotPresent
  resources:
    cpu: "2"
    memory: "4Gi"
  drainCheckEnabled: true
  drainCheckInterval: "10s"
  rollout: graceful
  nodeSelector:
    dedicated: firebolt-nodes
    zone: us-east-1a
  tolerations:
    - key: dedicated
      operator: Equal
      value: firebolt-nodes
      effect: NoSchedule
