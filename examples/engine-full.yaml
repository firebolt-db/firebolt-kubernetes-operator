apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata: {}
  gateway: {}
---
# FireboltEngine with every supported field set. Most are optional and have defaults.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: engine
spec:
  instanceRef: firebolt
  replicas: 5
  resources:
    cpu: "2"
    memory: 4Gi

  # Image override. When omitted, the operator's embedded default is used.
  image:
    repository: 000000000000.dkr.ecr.us-east-1.amazonaws.com/firebolt-core
    tag: release-4.32.0-pre.0.20260414104905.92750f097354-amd64
    pullPolicy: IfNotPresent

  # Rollout behaviour
  rollout: graceful                 # graceful (default) | recreate
  drainCheckEnabled: true
  drainCheckInterval: 10s
  terminationGracePeriodSeconds: 60

  # Scheduling
  nodeSelector:
    firebolt.dev/pool: engine
    topology.kubernetes.io/zone: us-east-1a
  tolerations:
    - key: firebolt.dev/pool
      operator: Equal
      value: engine
      effect: NoSchedule
