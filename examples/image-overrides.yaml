# Override the container images for both the metadata service and the engine.
# Useful when validating a release candidate or pinning a specific build.
#
# When `image:` is set, `repository` and `tag` are required. `pullPolicy`
# defaults to IfNotPresent.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata:
    image:
      repository: ghcr.io/firebolt-db/firebolt-metadata
      tag: 4.32.0-pre.0.20260424165648.0581dba99945
  gateway: {}
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: engine
spec:
  instanceRef: firebolt
  replicas: 1
  image:
    repository: ghcr.io/firebolt-db/firebolt-db
    tag: debug-4.32.0-pre.0.20260424165648.0581dba99945-amd64
  resources:
    cpu: "1"
    memory: 4Gi
