# Engine with spec.customEngineConfig. The object is deep-merged into the
# rendered engine config.yaml at the root, following the structured schema
# consumed by `firebolt server`. Keys placed under `logging:`, `auth:` etc.
# merge into the corresponding section, overriding the operator's defaults.
#
# Operator-authoritative paths are silently stripped from user input and
# cannot be overridden via this field:
#   - schema_version
#   - instance.id
#   - instance.type
#   - instance.multi_engine (entire subtree, including metadata_endpoint)
#   - engine.id
#   - engine.nodes
#   - engine.termination_grace_period
#
# Changes to customEngineConfig trigger a new blue-green generation.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata: {}
  gateway: {}
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: engine
spec:
  instanceRef: firebolt
  replicas: 1
  template:
    spec:
      containers:
        - name: engine
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              memory: 4Gi
  customEngineConfig:
    logging:
      level: debug
      format: text
