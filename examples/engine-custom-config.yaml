# Engine with spec.customEngineConfig. The object is deep-merged into the
# rendered engine config.json at the root: keys nested under `config:`
# merge into the inner config block (overriding operator defaults for
# account_name, organization_id, organization_name, cluster_id,
# logger_formatting, logger_use_files), and any keys placed at the top
# of customEngineConfig become siblings of `config` and `nodes` in the
# rendered file.
#
# Operator-authoritative paths are silently stripped from user input and
# cannot be overridden via this field:
#   - nodes (root)
#   - config.account_id
#   - config.engine_id
#   - config.engine_name
#   - config.multi_engine_endpoint
#   - config.multi_engine_mode_enabled
#   - config.shutdown_wait_unfinished
#
# Changes to customEngineConfig trigger a new blue-green generation.
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltInstance
metadata:
  name: firebolt
spec:
  metadata: {}
  gateway: {}
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: engine
spec:
  instanceRef: firebolt
  replicas: 1
  resources:
    cpu: "1"
    memory: 4Gi
  customEngineConfig:
    config:
      account_name: acme
      organization_id: 01KP98J0000000000000000099
      organization_name: acme-org
      cluster_id: prod-cluster
      logger_formatting: json
      logger_use_files: false
