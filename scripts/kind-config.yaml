kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Two schedulable nodes (control-plane + 1 worker) so engine-full's required
# podAntiAffinity on kubernetes.io/hostname can place replicas=2.
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: KubeletConfiguration
    maxPods: 250
  - |
    kind: InitConfiguration
    nodeRegistration:
      taints: []
- role: worker
  kubeadmConfigPatches:
  - |
    kind: KubeletConfiguration
    maxPods: 250
