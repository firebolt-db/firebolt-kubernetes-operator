---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: fireboltengines.compute.firebolt.io
spec:
  group: compute.firebolt.io
  names:
    kind: FireboltEngine
    listKind: FireboltEngineList
    plural: fireboltengines
    shortNames:
    - fireng
    singular: fireboltengine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.activeGeneration
      name: Generation
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: FireboltEngine is the Schema for the fireboltengines API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              FireboltEngineSpec defines the desired state of a Firebolt engine.

              The CEL rule freezes spec.metadataEndpointOverride once it has been set
              (or unset) at creation time. The field selects the cross-cluster metadata
              topology the engine's nodes bake into their on-disk configuration; letting
              users mutate it later would silently force a full blue-green rollout (it
              participates in stsMatchesSpec via AnnotationMetadataOverride) and would
              break the instanceInfo-drift invariant computeStable relies on to allow
              in-place recovery of a deleted ConfigMap (rebuild-at-same-gen produces
              byte-identical content only when all ConfigMap inputs are frozen).
              The wording mirrors the set-once pattern on FireboltInstanceSpec.ID,
              adapted for an optional pointer field via has(): absent-on-create may
              still transition to set, but any set value may not subsequently be
              changed or cleared.
            properties:
              autoscaling:
                description: |-
                  Autoscaling configures automatic replica management for this engine.
                  When omitted or with Enabled=false, replicas is governed entirely by
                  the user. When enabled, the autoscaler owns spec.replicas (HPA-style)
                  and mutates it based on query activity and Schedule windows.
                properties:
                  enabled:
                    default: false
                    description: Enabled turns the autoscaler on for this engine.
                      Defaults to false.
                    type: boolean
                  idleTimeout:
                    default: 30m
                    description: |-
                      IdleTimeout is how long the engine must observe zero in-flight and
                      suspended queries before the autoscaler scales down to MinReplicas.
                      Defaults to 30 minutes.
                    type: string
                  maxReplicas:
                    description: |-
                      MaxReplicas is the replica count the autoscaler scales up to when the
                      engine is active (during a Schedule window or following a wake-up).
                      Required when Enabled is true.
                    format: int32
                    minimum: 1
                    type: integer
                  minReplicas:
                    default: 0
                    description: |-
                      MinReplicas is the floor the autoscaler scales down to once IdleTimeout
                      elapses with no observed query activity. 0 enables scale-to-zero.
                      Defaults to 0.
                    format: int32
                    minimum: 0
                    type: integer
                  pollInterval:
                    default: 1m
                    description: |-
                      PollInterval is how often the autoscaler scrapes engine metrics to
                      re-evaluate idleness. Defaults to 1 minute.
                    type: string
                  schedule:
                    description: |-
                      Schedule is an optional list of UTC time windows during which the
                      autoscaler holds the engine at MaxReplicas regardless of observed
                      activity. Useful for "always-on during business hours" policies.
                    items:
                      description: |-
                        ScheduleWindow is a recurring UTC time window during which the autoscaler
                        keeps the engine pinned at MaxReplicas. End may be less than Start to
                        express a window that crosses midnight (e.g. 22:00-02:00).
                      properties:
                        days:
                          description: |-
                            Days lists the UTC weekdays the window applies to. Empty means every
                            day. The window is anchored to the day on which Start falls; if End
                            crosses midnight the trailing portion still belongs to the listed day.
                          items:
                            description: ScheduleDay is a UTC weekday code used in
                              ScheduleWindow.Days.
                            enum:
                            - Mon
                            - Tue
                            - Wed
                            - Thu
                            - Fri
                            - Sat
                            - Sun
                            type: string
                          type: array
                        end:
                          description: |-
                            End is the window closing time in UTC, formatted "HH:MM". An End equal
                            to Start is treated as an empty window.
                          pattern: ^([01]\d|2[0-3]):[0-5]\d$
                          type: string
                        start:
                          description: Start is the window opening time in UTC, formatted
                            "HH:MM".
                          pattern: ^([01]\d|2[0-3]):[0-5]\d$
                          type: string
                      required:
                      - end
                      - start
                      type: object
                    type: array
                required:
                - enabled
                - maxReplicas
                type: object
                x-kubernetes-validations:
                - message: maxReplicas must be >= minReplicas
                  rule: 'self.maxReplicas >= (has(self.minReplicas) ? self.minReplicas
                    : 0)'
              customEngineConfig:
                description: |-
                  CustomEngineConfig is a free-form JSON object deep-merged into the
                  rendered engine config.json at the root. The rendered document has
                  shape `{"config": {...}, "nodes": [...]}`; keys placed at the top of
                  customEngineConfig become siblings of `config` and `nodes`, and keys
                  nested under `config:` are deep-merged into the inner config block,
                  overriding the operator's defaults for: account_name, organization_id,
                  organization_name, cluster_id, logger_formatting, and logger_use_files.
                  Any additional keys understood by the engine binary may be set at
                  either level.

                  The operator retains authority over identity, routing, and topology
                  paths. The following are silently stripped from user input before the
                  merge and cannot be overridden via this field:

                    - nodes (root)
                    - config.account_id
                    - config.engine_id
                    - config.engine_name
                    - config.multi_engine_endpoint
                    - config.multi_engine_mode_enabled
                    - config.shutdown_wait_unfinished

                  Changes to this field trigger a new blue-green generation, since the
                  rendered config.json content changes.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              drainCheckEnabled:
                default: true
                description: |-
                  DrainCheckEnabled controls whether the operator performs a SQL-based drain
                  check on old-generation pods during graceful rollouts. When false, the
                  operator skips directly to cleaning after switching traffic, without
                  verifying that in-flight queries have completed. Requires a running
                  node that can execute the drain-check query when enabled.
                type: boolean
              drainCheckInterval:
                description: |-
                  DrainCheckInterval controls how often to check if old pods have finished serving queries.
                  Only used when drainCheckEnabled is true.
                type: string
              image:
                description: |-
                  Image defines the container image to use.
                  If not specified, defaults to the engine image embedded in the operator binary.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines when to pull the image.
                    enum:
                    - Always
                    - Never
                    - IfNotPresent
                    type: string
                  repository:
                    description: Repository is the container image repository.
                    minLength: 1
                    type: string
                  tag:
                    description: Tag is the container image tag.
                    minLength: 1
                    type: string
                required:
                - repository
                - tag
                type: object
              instanceRef:
                description: |-
                  InstanceRef is the name of the FireboltInstance in the same namespace
                  that this engine depends on. The engine reconciler will not proceed
                  until the referenced instance has a populated metadata endpoint and
                  account ID. This field is immutable after creation.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: instanceRef is immutable
                  rule: self == oldSelf
              metadataEndpointOverride:
                description: |-
                  MetadataEndpointOverride overrides the metadata endpoint for this engine.
                  If nil, the engine uses Instance.status.metadataEndpoint (with intra-cluster
                  topology-aware routing). Set this for cross-cluster scenarios where the engine
                  connects to a metadata service in a different cluster via private link.

                  Immutable once set: see the struct-level CEL rule on FireboltEngineSpec.
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector constrains which nodes the engine pods can
                  be scheduled on.
                type: object
              podSecurityContext:
                description: |-
                  PodSecurityContext sets pod-level security attributes stamped on the
                  engine pod template. The operator unconditionally applies an fsGroup
                  (3473) so the kernel chowns the per-pod data PVC for the engine
                  process; setting fsGroup here overrides that default. All other fields
                  are passed through verbatim.

                  Changes to this field trigger a new blue-green generation.
                properties:
                  appArmorProfile:
                    description: |-
                      appArmorProfile is the AppArmor options to use by the containers in this pod.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      localhostProfile:
                        description: |-
                          localhostProfile indicates a profile loaded on the node that should be used.
                          The profile must be preconfigured on the node to work.
                          Must match the loaded name of the profile.
                          Must be set if and only if type is "Localhost".
                        type: string
                      type:
                        description: |-
                          type indicates which kind of AppArmor profile will be applied.
                          Valid options are:
                            Localhost - a profile pre-loaded on the node.
                            RuntimeDefault - the container runtime's default profile.
                            Unconfined - no AppArmor enforcement.
                        type: string
                    required:
                    - type
                    type: object
                  fsGroup:
                    description: |-
                      A special supplemental group that applies to all containers in a pod.
                      Some volume types allow the Kubelet to change the ownership of that volume
                      to be owned by the pod:

                      1. The owning GID will be the FSGroup
                      2. The setgid bit is set (new files created in the volume will be owned by FSGroup)
                      3. The permission bits are OR'd with rw-rw----

                      If unset, the Kubelet will not modify the ownership and permissions of any volume.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  fsGroupChangePolicy:
                    description: |-
                      fsGroupChangePolicy defines behavior of changing ownership and permission of the volume
                      before being exposed inside Pod. This field will only apply to
                      volume types which support fsGroup based ownership(and permissions).
                      It will have no effect on ephemeral volume types such as: secret, configmaps
                      and emptydir.
                      Valid values are "OnRootMismatch" and "Always". If not specified, "Always" is used.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: string
                  runAsGroup:
                    description: |-
                      The GID to run the entrypoint of the container process.
                      Uses runtime default if unset.
                      May also be set in SecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence
                      for that container.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  runAsNonRoot:
                    description: |-
                      Indicates that the container must run as a non-root user.
                      If true, the Kubelet will validate the image at runtime to ensure that it
                      does not run as UID 0 (root) and fail to start the container if it does.
                      If unset or false, no such validation will be performed.
                      May also be set in SecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                    type: boolean
                  runAsUser:
                    description: |-
                      The UID to run the entrypoint of the container process.
                      Defaults to user specified in image metadata if unspecified.
                      May also be set in SecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence
                      for that container.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  seLinuxChangePolicy:
                    description: |-
                      seLinuxChangePolicy defines how the container's SELinux label is applied to all volumes used by the Pod.
                      It has no effect on nodes that do not support SELinux or to volumes does not support SELinux.
                      Valid values are "MountOption" and "Recursive".

                      "Recursive" means relabeling of all files on all Pod volumes by the container runtime.
                      This may be slow for large volumes, but allows mixing privileged and unprivileged Pods sharing the same volume on the same node.

                      "MountOption" mounts all eligible Pod volumes with `-o context` mount option.
                      This requires all Pods that share the same volume to use the same SELinux label.
                      It is not possible to share the same volume among privileged and unprivileged Pods.
                      Eligible volumes are in-tree FibreChannel and iSCSI volumes, and all CSI volumes
                      whose CSI driver announces SELinux support by setting spec.seLinuxMount: true in their
                      CSIDriver instance. Other volumes are always re-labelled recursively.
                      "MountOption" value is allowed only when SELinuxMount feature gate is enabled.

                      If not specified and SELinuxMount feature gate is enabled, "MountOption" is used.
                      If not specified and SELinuxMount feature gate is disabled, "MountOption" is used for ReadWriteOncePod volumes
                      and "Recursive" for all other volumes.

                      This field affects only Pods that have SELinux label set, either in PodSecurityContext or in SecurityContext of all containers.

                      All Pods that use the same volume should use the same seLinuxChangePolicy, otherwise some pods can get stuck in ContainerCreating state.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: string
                  seLinuxOptions:
                    description: |-
                      The SELinux context to be applied to all containers.
                      If unspecified, the container runtime will allocate a random SELinux context for each
                      container.  May also be set in SecurityContext.  If set in
                      both SecurityContext and PodSecurityContext, the value specified in SecurityContext
                      takes precedence for that container.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      level:
                        description: Level is SELinux level label that applies to
                          the container.
                        type: string
                      role:
                        description: Role is a SELinux role label that applies to
                          the container.
                        type: string
                      type:
                        description: Type is a SELinux type label that applies to
                          the container.
                        type: string
                      user:
                        description: User is a SELinux user label that applies to
                          the container.
                        type: string
                    type: object
                  seccompProfile:
                    description: |-
                      The seccomp options to use by the containers in this pod.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      localhostProfile:
                        description: |-
                          localhostProfile indicates a profile defined in a file on the node should be used.
                          The profile must be preconfigured on the node to work.
                          Must be a descending path, relative to the kubelet's configured seccomp profile location.
                          Must be set if type is "Localhost". Must NOT be set for any other type.
                        type: string
                      type:
                        description: |-
                          type indicates which kind of seccomp profile will be applied.
                          Valid options are:

                          Localhost - a profile defined in a file on the node should be used.
                          RuntimeDefault - the container runtime default profile should be used.
                          Unconfined - no profile should be applied.
                        type: string
                    required:
                    - type
                    type: object
                  supplementalGroups:
                    description: |-
                      A list of groups applied to the first process run in each container, in
                      addition to the container's primary GID and fsGroup (if specified).  If
                      the SupplementalGroupsPolicy feature is enabled, the
                      supplementalGroupsPolicy field determines whether these are in addition
                      to or instead of any group memberships defined in the container image.
                      If unspecified, no additional groups are added, though group memberships
                      defined in the container image may still be used, depending on the
                      supplementalGroupsPolicy field.
                      Note that this field cannot be set when spec.os.name is windows.
                    items:
                      format: int64
                      type: integer
                    type: array
                    x-kubernetes-list-type: atomic
                  supplementalGroupsPolicy:
                    description: |-
                      Defines how supplemental groups of the first container processes are calculated.
                      Valid values are "Merge" and "Strict". If not specified, "Merge" is used.
                      (Alpha) Using the field requires the SupplementalGroupsPolicy feature gate to be enabled
                      and the container runtime must implement support for this feature.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: string
                  sysctls:
                    description: |-
                      Sysctls hold a list of namespaced sysctls used for the pod. Pods with unsupported
                      sysctls (by the container runtime) might fail to launch.
                      Note that this field cannot be set when spec.os.name is windows.
                    items:
                      description: Sysctl defines a kernel parameter to be set
                      properties:
                        name:
                          description: Name of a property to set
                          type: string
                        value:
                          description: Value of a property to set
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  windowsOptions:
                    description: |-
                      The Windows specific settings applied to all containers.
                      If unspecified, the options within a container's SecurityContext will be used.
                      If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is linux.
                    properties:
                      gmsaCredentialSpec:
                        description: |-
                          GMSACredentialSpec is where the GMSA admission webhook
                          (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
                          GMSA credential spec named by the GMSACredentialSpecName field.
                        type: string
                      gmsaCredentialSpecName:
                        description: GMSACredentialSpecName is the name of the GMSA
                          credential spec to use.
                        type: string
                      hostProcess:
                        description: |-
                          HostProcess determines if a container should be run as a 'Host Process' container.
                          All of a Pod's containers must have the same effective HostProcess value
                          (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
                          In addition, if HostProcess is true then HostNetwork must also be set to true.
                        type: boolean
                      runAsUserName:
                        description: |-
                          The UserName in Windows to run the entrypoint of the container process.
                          Defaults to the user specified in image metadata if unspecified.
                          May also be set in PodSecurityContext. If set in both SecurityContext and
                          PodSecurityContext, the value specified in SecurityContext takes precedence.
                        type: string
                    type: object
                type: object
              replicas:
                description: |-
                  Replicas is the number of engine nodes. Set to 0 to stop the
                  engine: the operator tears down the active generation (honoring
                  spec.rollout for drain behavior) and leaves the CR in the
                  Stopped phase. Setting replicas back to a non-zero value resumes
                  the engine via a new blue-green generation.
                format: int32
                minimum: 0
                type: integer
              resources:
                description: Resources defines the Kubernetes resource requests and
                  limits for engine pods.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              rollout:
                default: graceful
                description: 'Rollout strategy for transitions: "graceful" waits for
                  drain, "recreate" deletes immediately.'
                enum:
                - graceful
                - recreate
                type: string
              securityContext:
                description: |-
                  SecurityContext sets container-level security attributes for the
                  engine container. The value is passed through verbatim; the operator
                  applies no defaults at the container scope.

                  Changes to this field trigger a new blue-green generation.
                properties:
                  allowPrivilegeEscalation:
                    description: |-
                      AllowPrivilegeEscalation controls whether a process can gain more
                      privileges than its parent process. This bool directly controls if
                      the no_new_privs flag will be set on the container process.
                      AllowPrivilegeEscalation is true always when the container is:
                      1) run as Privileged
                      2) has CAP_SYS_ADMIN
                      Note that this field cannot be set when spec.os.name is windows.
                    type: boolean
                  appArmorProfile:
                    description: |-
                      appArmorProfile is the AppArmor options to use by this container. If set, this profile
                      overrides the pod's appArmorProfile.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      localhostProfile:
                        description: |-
                          localhostProfile indicates a profile loaded on the node that should be used.
                          The profile must be preconfigured on the node to work.
                          Must match the loaded name of the profile.
                          Must be set if and only if type is "Localhost".
                        type: string
                      type:
                        description: |-
                          type indicates which kind of AppArmor profile will be applied.
                          Valid options are:
                            Localhost - a profile pre-loaded on the node.
                            RuntimeDefault - the container runtime's default profile.
                            Unconfined - no AppArmor enforcement.
                        type: string
                    required:
                    - type
                    type: object
                  capabilities:
                    description: |-
                      The capabilities to add/drop when running containers.
                      Defaults to the default set of capabilities granted by the container runtime.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      add:
                        description: Added capabilities
                        items:
                          description: Capability represent POSIX capabilities type
                          type: string
                        type: array
                        x-kubernetes-list-type: atomic
                      drop:
                        description: Removed capabilities
                        items:
                          description: Capability represent POSIX capabilities type
                          type: string
                        type: array
                        x-kubernetes-list-type: atomic
                    type: object
                  privileged:
                    description: |-
                      Run container in privileged mode.
                      Processes in privileged containers are essentially equivalent to root on the host.
                      Defaults to false.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: boolean
                  procMount:
                    description: |-
                      procMount denotes the type of proc mount to use for the containers.
                      The default value is Default which uses the container runtime defaults for
                      readonly paths and masked paths.
                      This requires the ProcMountType feature flag to be enabled.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: string
                  readOnlyRootFilesystem:
                    description: |-
                      Whether this container has a read-only root filesystem.
                      Default is false.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: boolean
                  runAsGroup:
                    description: |-
                      The GID to run the entrypoint of the container process.
                      Uses runtime default if unset.
                      May also be set in PodSecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  runAsNonRoot:
                    description: |-
                      Indicates that the container must run as a non-root user.
                      If true, the Kubelet will validate the image at runtime to ensure that it
                      does not run as UID 0 (root) and fail to start the container if it does.
                      If unset or false, no such validation will be performed.
                      May also be set in PodSecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                    type: boolean
                  runAsUser:
                    description: |-
                      The UID to run the entrypoint of the container process.
                      Defaults to user specified in image metadata if unspecified.
                      May also be set in PodSecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  seLinuxOptions:
                    description: |-
                      The SELinux context to be applied to the container.
                      If unspecified, the container runtime will allocate a random SELinux context for each
                      container.  May also be set in PodSecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      level:
                        description: Level is SELinux level label that applies to
                          the container.
                        type: string
                      role:
                        description: Role is a SELinux role label that applies to
                          the container.
                        type: string
                      type:
                        description: Type is a SELinux type label that applies to
                          the container.
                        type: string
                      user:
                        description: User is a SELinux user label that applies to
                          the container.
                        type: string
                    type: object
                  seccompProfile:
                    description: |-
                      The seccomp options to use by this container. If seccomp options are
                      provided at both the pod & container level, the container options
                      override the pod options.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      localhostProfile:
                        description: |-
                          localhostProfile indicates a profile defined in a file on the node should be used.
