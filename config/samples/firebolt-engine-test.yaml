apiVersion: v1
kind: Namespace
metadata:
  name: firebolt
---
apiVersion: compute.firebolt.io/v1alpha1
kind: FireboltEngine
metadata:
  name: engine-test
  namespace: firebolt
spec:
  replicas: 1
  # Image flows from the operator-default (or an EngineClass when set via
  # spec.engineClassRef); no per-engine image override.
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
