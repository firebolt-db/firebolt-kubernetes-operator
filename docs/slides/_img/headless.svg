<svg xmlns="http://www.w3.org/2000/svg" viewBox="390 0 330 235" width="1320" height="940" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="720" height="235" fill="#f8f9fa" rx="8"/>

  <!-- Envoy box -->
  <rect x="445" y="10" width="200" height="48" rx="6" fill="#2980b9" stroke="#1a5276" stroke-width="1.5"/>
  <text x="545" y="29" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Envoy Gateway</text>
  <text x="545" y="47" text-anchor="middle" font-size="11" fill="#d6eaf8">sees all pod IPs</text>

  <!-- Arrows directly to pods -->
  <line x1="495" y1="58" x2="460" y2="100" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="545" y1="58" x2="545" y2="100" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="595" y1="58" x2="630" y2="100" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DNS label -->
  <text x="590" y="78" font-size="10" fill="#7f8c8d" font-style="italic">DNS → pod IPs</text>

  <!-- Pods -->
  <rect x="405" y="102" width="110" height="36" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="460" y="125" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod A</text>

  <rect x="490" y="102" width="110" height="36" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="545" y="125" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod B</text>

  <rect x="575" y="102" width="110" height="36" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="630" y="121" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod C</text>
  <text x="630" y="133" text-anchor="middle" font-size="9.5" fill="#fde8e8">SIGTERM → 503</text>

  <!-- Health check badge -->
  <rect x="590" y="145" width="80" height="18" rx="4" fill="#c0392b"/>
  <text x="630" y="158" text-anchor="middle" font-size="9.5" fill="white" font-weight="bold">ejected ✓</text>

  <!-- Success callouts -->
  <line x1="545" y1="172" x2="545" y2="196" stroke="#1e8449" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="545" y="208" text-anchor="middle" font-size="10.5" fill="#1e8449">✓  per-pod LB + retries</text>
  <text x="545" y="222" text-anchor="middle" font-size="10.5" fill="#1e8449">✓  drain ejection in ≤1 s</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>

</svg>
