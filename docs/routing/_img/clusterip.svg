<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="1440" height="680" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="720" height="340" fill="#f8f9fa" rx="8"/>

  <!-- === LEFT SIDE: ClusterIP (broken) === -->

  <!-- Section label -->
  <text x="180" y="28" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">ClusterIP Service</text>

  <!-- Envoy box -->
  <rect x="80" y="45" width="200" height="48" rx="6" fill="#2980b9" stroke="#1a5276" stroke-width="1.5"/>
  <text x="180" y="64" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Envoy Gateway</text>
  <text x="180" y="82" text-anchor="middle" font-size="11" fill="#d6eaf8">sees 1 endpoint</text>

  <!-- Arrow down to VIP -->
  <line x1="180" y1="93" x2="180" y2="128" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ClusterIP VIP box -->
  <rect x="60" y="130" width="240" height="44" rx="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="180" y="148" text-anchor="middle" font-size="12" fill="white" font-weight="bold">ClusterIP VIP (Cilium eBPF)</text>
  <text x="180" y="164" text-anchor="middle" font-size="10.5" fill="#fde8e8">pod selection: Cilium decides</text>

  <!-- Arrows to pods -->
  <line x1="110" y1="174" x2="80"  y2="225" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="174" x2="180" y2="225" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="174" x2="280" y2="225" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Pods -->
  <rect x="30"  y="227" width="100" height="36" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="80"  y="250" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod A</text>

  <rect x="130" y="227" width="100" height="36" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="180" y="250" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod B</text>

  <rect x="230" y="227" width="100" height="36" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="280" y="250" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod C</text>

  <!-- Problem callouts -->
  <line x1="180" y1="263" x2="180" y2="295" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="180" y="309" text-anchor="middle" font-size="10.5" fill="#c0392b">✗  no per-pod control</text>
  <text x="180" y="323" text-anchor="middle" font-size="10.5" fill="#c0392b">✗  retry hits same VIP again</text>

  <!-- === DIVIDER === -->
  <line x1="370" y1="30" x2="370" y2="310" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- === RIGHT SIDE: Headless (correct) === -->

  <!-- Section label -->
  <text x="545" y="28" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="bold">Headless Service</text>

  <!-- Envoy box -->
  <rect x="445" y="45" width="200" height="48" rx="6" fill="#2980b9" stroke="#1a5276" stroke-width="1.5"/>
  <text x="545" y="64" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Envoy Gateway</text>
  <text x="545" y="82" text-anchor="middle" font-size="11" fill="#d6eaf8">sees all pod IPs</text>

  <!-- Arrows directly to pods (fan out) -->
  <line x1="495" y1="93" x2="460"  y2="185" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="545" y1="93" x2="545"  y2="185" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="595" y1="93" x2="630"  y2="185" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DNS label on middle arrow -->
  <text x="590" y="142" font-size="10" fill="#7f8c8d" font-style="italic">DNS → pod IPs</text>

  <!-- Pods -->
  <rect x="405" y="187" width="110" height="36" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="460" y="210" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod A</text>

  <rect x="490" y="187" width="110" height="36" rx="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="545" y="210" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod B</text>

  <rect x="575" y="187" width="110" height="36" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="630" y="206" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Pod C</text>
  <text x="630" y="218" text-anchor="middle" font-size="9.5" fill="#fde8e8">SIGTERM → 503</text>

  <!-- Health check badge on Pod C -->
  <rect x="590" y="230" width="80" height="20" rx="4" fill="#c0392b"/>
  <text x="630" y="244" text-anchor="middle" font-size="9.5" fill="white" font-weight="bold">ejected ✓</text>

  <!-- Success callouts -->
  <line x1="545" y1="263" x2="545" y2="295" stroke="#1e8449" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="545" y="309" text-anchor="middle" font-size="10.5" fill="#1e8449">✓  per-pod LB + retries</text>
  <text x="545" y="323" text-anchor="middle" font-size="10.5" fill="#1e8449">✓  drain ejection in ≤1 s</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>

</svg>
