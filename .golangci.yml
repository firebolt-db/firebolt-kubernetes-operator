---
version: "2"
run:
  allow-parallel-runners: true

linters:
  default: none
  enable:
    # Default
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Code quality
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - dupl
    - durationcheck
    - errorlint
    - exhaustive
    - forcetypeassert
    - ginkgolinter
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - lll
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - thelper
    - unconvert
    - unparam
    - wastedassign

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    goconst:
      min-occurrences: 5
      min-len: 10

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - paramTypeCombine
        - unnamedResult
      settings:
        hugeParam:
          sizeThreshold: 140

    gocyclo:
      min-complexity: 30

    lll:
      line-length: 140

    misspell:
      locale: US
      ignore-rules:
        - firebolt

    nakedret:
      max-func-lines: 1

    exhaustive:
      default-signifies-exhaustive: true

    revive:
      enable-all-rules: true
      rules:
        - name: line-length-limit
          disabled: true
        - name: nested-structs
          disabled: true
        - name: add-constant
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: argument-limit
          disabled: true
        - name: function-length
          disabled: true
        - name: use-any
          disabled: true
        - name: unused-receiver
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: unchecked-type-assertion
          disabled: true
        - name: bare-return
          disabled: true
        - name: defer
          disabled: false
        - name: modifies-value-receiver
          disabled: false
        - name: comment-spacings
          disabled: false
        - name: import-shadowing
          disabled: false

  exclusions:
    generated: lax
    rules:
      - linters:
          - goconst
          - lll
          - dupl
          - funlen
          - gocyclo
          - prealloc
          - gosec
          - forcetypeassert
        path: _test\.go
      # Ginkgo and Gomega are designed around dot imports; this is the standard
      # usage pattern endorsed by the frameworks' documentation.
      - linters:
          - revive
        path: _test\.go
        text: "dot-imports"
      # json:",inline" is standard Kubernetes CRD embedding for TypeMeta,
      # ObjectMeta, and spec composition; revive incorrectly flags it.
      - linters:
          - revive
        text: "unknown option \"inline\" in json tag"
      # Test helpers run kubectl and kind as subprocesses; these are not
      # user-facing and don't need CommandContext or input sanitization.
      - linters:
          - gosec
          - noctx
        path: test/testhelpers/
      - linters:
          - dupl
          - lll
        path: internal/*
      # kubebuilder validation markers (XValidation CEL rules, complex
      # enum lists, etc.) live on a single comment line by design and
      # routinely exceed the lll limit. The rule bodies cannot be split.
      - linters:
          - lll
        source: "kubebuilder:validation:"
      - path: _test\.go
        text: "is deprecated:"
      - path: (.+)\.go$
        text: "package-comments: should have a package comment"
      - path: (.+)\.go$
        text: Error return value of .((os\.)?std(out|err)\..*|.*Flush|.*printf?). is not checked
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
